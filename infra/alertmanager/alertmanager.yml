# Alertmanager — Telegram receivers for OneLog (MCP-only rollout).
#
# Pipeline: vmalert (LogsQL stats) → alertmanager → Telegram Bot API.
# Triage flow: ops nhận alert → mở VMUI / dùng Claude+MCP.
#
# Two receivers differ ONLY by send_resolved (anti RESOLVED noise for
# one-shot events). Route matches `notify_style=event` label (set in rules.yml
# for instant/event-style rules).
#
# Token + chat_id render từ infra/.env (TELEGRAM_BOT_TOKEN, TELEGRAM_ALERT_CHAT_ID)
# qua sed entrypoint trong docker-compose. KHÔNG run alertmanager trực tiếp trên
# file này — placeholder chưa thay.

global:
  resolve_timeout: 5m

route:
  receiver: telegram-trend          # default: burst/trend rules → send RESOLVED
  group_by: ["alertname", "host"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 15m
  routes:
    # Event-style rules (OomKillEvent, DiskFullErrors, NewUserOrSudoer):
    # event đã xảy ra rồi, RESOLVED chỉ nói "không có thêm trong 5m" → noise.
    - matchers:
        - notify_style="event"
      receiver: telegram-event

receivers:
  - name: telegram-trend
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: &telegram_message_template |
          {{ if eq .Status "firing" }}🔥 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }} — <b>{{ if .CommonLabels.alertname }}{{ .CommonLabels.alertname }}{{ else }}không xác định{{ end }}</b>{{ if gt (len .Alerts) 1 }} (×{{ len .Alerts }}){{ end }}
          {{ range .Alerts }}
          ━━━━━━━━━━━━━━━━━━━━
          {{ if eq .Labels.severity "critical" }}🔴{{ else if eq .Labels.severity "warning" }}⚠️{{ else }}ℹ️{{ end }} <b>severity:</b>    <code>{{ if .Labels.severity }}{{ .Labels.severity }}{{ else }}không xác định{{ end }}</code>
          🏷 <b>category:</b>    <code>{{ if .Labels.category }}{{ .Labels.category }}{{ else }}không xác định{{ end }}</code>
          🖥 <b>host:</b>        <code>{{ if .Labels.host }}{{ .Labels.host }}{{ else }}không xác định{{ end }}</code>
          📡 <b>host_ip:</b>     <code>{{ if .Labels.host_ip }}{{ .Labels.host_ip }}{{ else }}không xác định{{ end }}</code>
          🌐 <b>attacker_ip:</b> <code>{{ if .Labels.attacker_ip }}{{ .Labels.attacker_ip }}{{ else }}không xác định{{ end }}</code>
          🕒 <b>started:</b>     <code>{{ if .StartsAt.IsZero }}không xác định{{ else }}{{ .StartsAt.Local.Format "02/01/2006 15:04:05 -07:00" }}{{ end }}</code>
          {{ if eq $.Status "resolved" }}🕓 <b>ended:</b>       <code>{{ if .EndsAt.IsZero }}không xác định{{ else }}{{ .EndsAt.Local.Format "02/01/2006 15:04:05 -07:00" }}{{ end }}</code>
          {{ end }}📝 <b>summary:</b>     {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}không xác định{{ end }}
          ℹ️ <b>detail:</b>      <i>{{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}không xác định{{ end }}</i>

          🔗 <b>VMUI:</b> <code>{{ if .Labels.host }}host:{{ .Labels.host }}{{ else if .Labels.attacker_ip }}_msg:"{{ .Labels.attacker_ip }}"{{ else }}không xác định{{ end }}</code>
          {{ if .GeneratorURL }}🛠 <b>Rule:</b> <a href="{{ .GeneratorURL }}">vmalert</a>
          {{ end }}🤖 <b>Triage:</b> Claude+MCP
          {{ end }}

  - name: telegram-event
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: false   # event-style: chỉ FIRING, không gửi RESOLVED
        message: *telegram_message_template

inhibit_rules: []
