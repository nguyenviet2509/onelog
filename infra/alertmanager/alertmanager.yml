# Alertmanager — Telegram receiver for OneLog (MCP-only rollout).
#
# Pipeline: vmalert (LogsQL stats) → alertmanager → Telegram Bot API.
# Triage flow: ops nhận alert → mở VMUI bằng query gợi ý / dùng Claude+MCP.
#
# Token + chat_id render từ infra/.env (TELEGRAM_BOT_TOKEN, TELEGRAM_ALERT_CHAT_ID)
# qua sed entrypoint trong docker-compose. KHÔNG run alertmanager trực tiếp trên
# file này — placeholder chưa thay.

global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname", "host"]
  group_wait: 10s
  group_interval: 5m
  # 15m: balance giữa test-friendly + chống spam cho team ops 5 người.
  # Tăng lên 30m-1h khi ops có SLO ack rõ + log alert hằng ngày.
  repeat_interval: 15m

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🔥 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }} — {{ .CommonLabels.alertname }}
          {{ range .Alerts }}
          {{ if eq .Labels.severity "critical" }}🔴{{ else if eq .Labels.severity "warning" }}⚠️{{ else }}ℹ️{{ end }} <b>{{ .Labels.alertname }}</b> on <code>{{ .Labels.host }}</code>{{ if .Labels.host_ip }} (<code>{{ .Labels.host_ip }}</code>){{ end }}
          {{ if .Labels.attacker_ip }}   <b>Attacker:</b> <code>{{ .Labels.attacker_ip }}</code>
          {{ end }}   severity=<b>{{ .Labels.severity }}</b> · category={{ .Labels.category }}
             {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}

             {{ .Annotations.summary }}
             {{ if .Annotations.description }}<i>{{ .Annotations.description }}</i>{{ end }}

          → Investigate: VMUI query <code>host:{{ .Labels.host }}</code>{{ if .Labels.attacker_ip }} or <code>_msg:"{{ .Labels.attacker_ip }}"</code>{{ end }} · Claude+MCP for triage
          {{ end }}

inhibit_rules: []
