# Alertmanager — Telegram receivers for OneLog (MCP-only rollout).
#
# Pipeline: vmalert (LogsQL stats) → alertmanager → Telegram Bot API.
# Triage flow: ops nhận alert → mở VMUI / dùng Claude+MCP.
#
# Two receivers differ ONLY by send_resolved (anti RESOLVED noise for
# one-shot events). Route matches `notify_style=event` label (set in rules.yml
# for instant/event-style rules).
#
# Token + chat_id render từ infra/.env (TELEGRAM_BOT_TOKEN, TELEGRAM_ALERT_CHAT_ID)
# qua sed entrypoint trong docker-compose. KHÔNG run alertmanager trực tiếp trên
# file này — placeholder chưa thay.

global:
  resolve_timeout: 5m

route:
  # Default receiver = Client-Server topic (thread TELEGRAM_ALERT_THREAD_ID_CLIENT_SERVER).
  # Rsyslog forwarder giữ nguyên hostname thật của fleet client (không ép
  # naming convention). Log-server self-monitoring được whitelist bằng label
  # `host="logserver"` (Vector ép cho mọi docker + probe event) hoặc
  # `component=~"host|data-disk|root-partition|disk-probe"` (vmalert-metrics
  # scrape node_exporter của log-server + disk probe LogsQL rules).
  receiver: telegram-client-server
  # Group across hosts: cùng alertname + severity + category → 1 message
  # (dù có 200 host cùng fire). Trước đây group_by chứa `host` khiến mỗi host
  # spawn 1 Telegram message riêng → spam khi fleet-wide burst xảy ra.
  # Template render compact (chỉ list host) khi len(Alerts) > 10.
  group_by: ["alertname", "severity", "category"]
  group_wait: 30s                   # 30s window để gom burst cross-host
  group_interval: 5m
  repeat_interval: 2h               # default = severity=warning cadence (giảm noise)
  routes:
    # LLM cost rules (team=llm-cost): cost/balance alerts, cooldown 30m to
    # avoid billing-spike spam. Routes to LLM-Cost topic (thread từ
    # TELEGRAM_ALERT_THREAD_ID_LLM_COST) so ops sees when balance recovers.
    - matchers:
        - team="llm-cost"
      receiver: telegram-llm-cost
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 30m

    # ── Log-server self-monitoring → Log-Server topic (thread 880) ────────
    # Đặt các route này TRƯỚC event/critical để chúng thắng khi alert của
    # log-server có labels giao thoa (vd OomKillEvent trên logserver có cả
    # host=logserver và notify_style=event → phải về Log-Server topic).
    - matchers:
        - host="logserver"
      receiver: telegram-trend
    - matchers:
        - component="host"          # vmalert-metrics (CPU/RAM/load/swap/disk/net)
      receiver: telegram-trend
    - matchers:
        - component=~"data-disk|root-partition|disk-probe"
      receiver: telegram-trend

    # ── Fleet event-style (OomKillEvent, DiskFullErrors, NewUserOrSudoer,
    # LsphpSegfault) → Client-Server topic, send_resolved=false. Event đã xảy
    # ra rồi, RESOLVED chỉ nói "không có thêm trong 5m" → noise.
    - matchers:
        - notify_style="event"
      receiver: telegram-event

    # ── Fleet critical severity: rút repeat 2h → 30m để ops phản ứng nhanh.
    # Vẫn về Client-Server topic (default).
    - matchers:
        - severity="critical"
      receiver: telegram-client-server
      repeat_interval: 30m

receivers:
  - name: telegram-trend
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        message_thread_id: __TELEGRAM_THREAD_ID__
        parse_mode: HTML
        send_resolved: true
        message: &telegram_message_template |
          {{ if eq .Status "firing" }}🔥 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }} — <b>{{ .CommonLabels.alertname }}</b>{{ if gt (len .Alerts) 1 }} (×{{ len .Alerts }}){{ end }}
          {{ with .CommonLabels.severity }}<b>severity:</b> <code>{{ . }}</code>  {{ end }}{{ with .CommonLabels.category }}<b>category:</b> <code>{{ . }}</code>{{ end }}
          {{ if gt (len .Alerts) 10 }}
          ━━━━━━━━━━━━━━━━━━━━
          <b>{{ len .Alerts }} hosts affected</b> (compact view, first 10):
          {{ range $i, $a := .Alerts }}{{ if lt $i 10 }}• <code>{{ $a.Labels.host }}</code>{{ with $a.Labels.host_ip }} (<code>{{ . }}</code>){{ end }}{{ if not $a.StartsAt.IsZero }} — {{ $a.StartsAt.Local.Format "15:04:05" }}{{ end }}
          {{ end }}{{ end }}{{ if gt (len .Alerts) 10 }}… và các host còn lại (xem VMUI để đầy đủ)
          {{ end }}{{ with (index .Alerts 0).Labels.sample_msg }}<b>sample_msg:</b> <code>{{ . }}</code>
          {{ end }}{{ with (index .Alerts 0).Annotations.summary }}<b>summary:</b> {{ . }}
          {{ end }}{{ else }}{{ range .Alerts }}
          ━━━━━━━━━━━━━━━━━━━━
          {{ with .Labels.host }}<b>host:</b>        <code>{{ . }}</code>
          {{ end }}{{ with .Labels.host_ip }}<b>host_ip:</b>     <code>{{ . }}</code>
          {{ end }}{{ with .Labels.attacker_ip }}<b>attacker_ip:</b> <code>{{ . }}</code>
          {{ end }}{{ if not .StartsAt.IsZero }}<b>started:</b>     <code>{{ .StartsAt.Local.Format "02/01/2006 15:04:05 -07:00" }}</code>
          {{ end }}{{ if and (eq $.Status "resolved") (not .EndsAt.IsZero) }}<b>ended:</b>       <code>{{ .EndsAt.Local.Format "02/01/2006 15:04:05 -07:00" }}</code>
          {{ end }}{{ with .Labels.sample_msg }}<b>msg:</b>         <code>{{ . }}</code>
          {{ end }}{{ with .Annotations.summary }}<b>summary:</b>     {{ . }}
          {{ end }}{{ end }}{{ end }}

  # Event-style rules đều fire trên fleet syslog (OOM, ENOSPC, user/sudoer thay
  # đổi, lsphp segfault) → post vào Client-Server topic thay vì Log-server.
  - name: telegram-event
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        message_thread_id: __TELEGRAM_THREAD_ID_CLIENT_SERVER__
        parse_mode: HTML
        send_resolved: false   # event-style: chỉ FIRING, không gửi RESOLVED
        message: *telegram_message_template

  # Fleet client host alerts (SystemdServiceFailed, DbConnectionRefused, brute
  # force burst, …) — Client-Server topic. send_resolved=true để ops thấy khi
  # crashloop dừng / conn-refused hết.
  - name: telegram-client-server
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        message_thread_id: __TELEGRAM_THREAD_ID_CLIENT_SERVER__
        parse_mode: HTML
        send_resolved: true
        message: *telegram_message_template

  # LLM cost/quota alerts → separate topic (Quota alert). Same send_resolved=true
  # semantics as telegram-trend (ops needs RESOLVED after top-up).
  - name: telegram-llm-cost
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        message_thread_id: __TELEGRAM_THREAD_ID_LLM_COST__
        parse_mode: HTML
        send_resolved: true
        message: *telegram_message_template

inhibit_rules: []
