# Alertmanager — Telegram receiver, dedupe + group by alertname+host.
#
# This file uses placeholders rendered by docker-compose entrypoint (sed) at
# container start, sourcing $TELEGRAM_BOT_TOKEN + $TELEGRAM_CHAT_ID from
# infra/.env. DO NOT run alertmanager directly on this file — it must be
# rendered first (compose entrypoint handles it).

global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname", "host"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>{{ .Status | toUpper }}</b> — {{ .CommonLabels.alertname }}
          {{ range .Alerts }}
          • <b>{{ .Labels.alertname }}</b> on <code>{{ .Labels.host }}{{ if .Labels.attacker_ip }} (attacker {{ .Labels.attacker_ip }}){{ end }}</code>
            severity={{ .Labels.severity }} | category={{ .Labels.category }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
          {{ end }}

inhibit_rules: []
