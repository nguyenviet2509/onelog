[defaults]
inventory = ./inventory.ini
host_key_checking = False
forks = 20
stdout_callback = default
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/onelog-ansible-facts
fact_caching_timeout = 3600

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=5m -o ConnectTimeout=10
