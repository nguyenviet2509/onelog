# OneLog client fleet inventory — copy to inventory.ini, adjust hosts.
#
# Groups: split by env (prod/staging) or role (web/db/etc.) as you wish.
# `ansible_user` = SSH user with sudo. Assumes ssh-copy-id done; else add
# `--ask-pass --ask-become-pass` on `ansible-playbook` cmdline.

[onelog_clients:vars]
# Set to log server IP reachable by ALL clients (LAN). Overridable per-host.
log_server_ip=192.168.122.53
log_server_port=6514
ansible_user=ops
# ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'

[web]
web-01 ansible_host=192.168.122.20
web-02 ansible_host=192.168.122.21

[db]
db-01 ansible_host=192.168.122.30

[onelog_clients:children]
web
db
