# Drop this file at /etc/rsyslog.d/91-forward-onelog-json.conf on each client server.
# Replace LOG_SERVER_IP with the IP of your ragstack logserver.
# Reload:  sudo systemctl restart rsyslog
# Test:    logger -t json-test "hello json from $(hostname)"
# Verify:  ss -tnp | grep ':6515'   (must show ESTAB to LOG_SERVER_IP)
#
# When to pick this file over rsyslog-forward.conf (port 6514, RFC5424):
# - Client already forwards JSON to ELK/SIEM and wants OneLog as additional sink
# - Need structured fields (labels.*, trace.id) without RFC5424 SD-PARAM gymnastics
# - rsyslog ≥ 8.x (jsonf format requires modern omfwd)
#
# Schema = ECS-lite. Server-side Vector remap (rsyslog_json_normalize) maps to
# flat OneLog schema (_time/host/host_ip/severity/facility/service/_msg) before
# redact + sinks. `host_ip` is filled server-side from the TCP peer address —
# client does not need to know its own IP.

# ECS-lite JSON template — nested objects via constant() glue.
# Client-sent fields: @timestamp, host.name, log.level, log.syslog.facility,
# service.name, message.
template(name="OneLogJSON" type="list") {
  constant(value="{")
  constant(value="\"@timestamp\":\"")
  property(name="timereported" dateFormat="rfc3339")
  constant(value="\",\"host\":{\"name\":\"")
  property(name="hostname" format="json")
  constant(value="\"},\"log\":{\"level\":\"")
  property(name="syslogseverity-text" format="json")
  constant(value="\",\"syslog\":{\"facility\":\"")
  property(name="syslogfacility-text" format="json")
  constant(value="\"}},\"service\":{\"name\":\"")
  property(name="programname" format="json")
  constant(value="\"},\"message\":\"")
  property(name="msg" format="json")
  constant(value="\"}\n")
}

*.* action(type="omfwd"
  target="LOG_SERVER_IP"
  port="6515"
  protocol="tcp"
  template="OneLogJSON"
  action.resumeRetryCount="-1"
  queue.type="LinkedList"
  queue.size="10000"
  queue.filename="onelog_json_fwd"
  queue.saveOnShutdown="on"
  queue.maxDiskSpace="500m"
)
