# Drop this file at /etc/rsyslog.d/90-forward-ragstack.conf on each demo server
# Replace LOG_SERVER_IP with the IP of your ragstack VM
# Reload:  sudo systemctl restart rsyslog
# Test:    logger -t demo-test "hello from $(hostname)"

# Define template that preserves hostname + appname for Vector parse
template(name="ragstack_fmt" type="string"
  string="<%PRI%>%TIMESTAMP:::date-rfc3339% %HOSTNAME% %APP-NAME%[%PROCID%]: %msg%\n"
)

# Forward all logs to ragstack Vector (UDP 514)
*.* action(type="omfwd"
  target="LOG_SERVER_IP"
  port="514"
  protocol="udp"
  template="ragstack_fmt"
  action.resumeRetryCount="-1"
  queue.type="LinkedList"
  queue.size="10000"
)
