# Drop this file at /etc/rsyslog.d/90-forward-onelog.conf on each client server.
# Replace LOG_SERVER_IP with the IP of your ragstack logserver.
# Reload:  sudo systemctl restart rsyslog
# Test:    logger -t client-test "hello from $(hostname)"
# Verify:  ss -tnp | grep ':6514'   (must show ESTAB to LOG_SERVER_IP)
#
# Why TCP 6514 (not UDP 514):
# - reliable delivery (no silent drops under congestion)
# - disk queue resumes after logserver restart
# - RFC5424 timestamp (date-rfc3339) — Vector syslog parser accepts cleanly

# RFC5424 template — Vector strict parser requires ISO timestamp + structured fields
template(name="ragstack_fmt" type="string"
  string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% %APP-NAME% %PROCID% %MSGID% - %msg%\n"
)

*.* action(type="omfwd"
  target="LOG_SERVER_IP"
  port="6514"
  protocol="tcp"
  template="ragstack_fmt"
  action.resumeRetryCount="-1"
  queue.type="LinkedList"
  queue.size="10000"
  queue.filename="onelog_fwd"
  queue.saveOnShutdown="on"
  queue.maxDiskSpace="500m"
)
