# PoC stack for RAG Log Server (single-node, 3 demo servers)
# Bring up:  docker compose up -d
# Tear down: docker compose down
# Logs:      docker compose logs -f <service>

name: ragstack

services:
  victorialogs:
    image: victoriametrics/victoria-logs:${VL_IMAGE_TAG:-latest}
    container_name: ragstack-vl
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=${VL_RETENTION:-7d}
      - -httpListenAddr=:9428
      - -memory.allowedBytes=512MB
    ports:
      - "127.0.0.1:9428:9428"   # HTTP API (web/agent)
    volumes:
      - ./data/victorialogs:/victoria-logs-data
    healthcheck:
      # VL image is distroless (no wget/curl/nc/sh). Use the VL binary itself
      # as a liveness probe — if the process is alive it will respond to -help
      # and exit 0. HTTP readiness is verified indirectly via downstream
      # services (indexer, vmalert) failing loudly if VL is unreachable.
      test: ["CMD", "/victoria-logs-prod", "-help"]
      interval: 30s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-latest}
    container_name: ragstack-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # postgres: DECOMMISSIONED 2026-07-13 (previous chat/audit) + 2026-07-17 (KB
  # Phase 1 pivot to OpenWebUI native Knowledge — /web + Postgres removed).
  # No live service depends on Postgres. If resurrecting for a future feature,
  # uncomment and pick a fresh profile. Legacy dump at ./backup/postgres-legacy-*.sql.

  # redis: DECOMMISSIONED 2026-07-13. Was intended for agent alert dedup +
  # multi-replica session state, but agent uses in-memory TTL dedup
  # (agent/src/agent/alert_dedupe.py). Runtime verified: DBSIZE=0, 0 clients.
  # Resurrect if multi-replica agent needed (see docs/ha-roadmap.md).
  # redis:
  #   image: redis:7-alpine
  #   container_name: ragstack-redis
  #   restart: unless-stopped
  #   profiles: [agent]
  #   command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb"]
  #   ports:
  #     - "127.0.0.1:6379:6379"
  #   volumes:
  #     - ./data/redis:/data

  vector:
    image: timberio/vector:${VECTOR_IMAGE_TAG:-0.40.0-alpine}
    container_name: ragstack-vector
    restart: unless-stopped
    ports:
      - "514:514/udp"           # syslog UDP (RFC3164) from servers
      - "6514:6514/tcp"         # syslog TCP (RFC5424) optional
      - "6515:6515/tcp"         # rsyslog JSON line-delimited (ECS-lite) — IP whitelist via firewall
      - "127.0.0.1:8686:8686"   # Vector API
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      # Probe script cho exec source `openwebui_db_size`. Tách khỏi vector.yaml
      # vì Vector interpolate `$var` trong config strings (kể cả heredoc |) sẽ
      # đụng biến shell → Missing environment variable panic.
      - ./vector/probe-openwebui-db.sh:/etc/vector/probe-openwebui-db.sh:ro
      # Probe script cho exec source `logserver_disk_size` (data disk).
      - ./vector/probe-logserver-disk.sh:/etc/vector/probe-logserver-disk.sh:ro
      - ./data/vector:/var/lib/vector
      # Read-only mount cho exec source poll size (openwebui SQLite).
      # KHÔNG copy dữ liệu, chỉ `stat` file để emit metric event.
      - ./data/openwebui:/monitor/openwebui:ro
      # Docker socket read-only — cần cho source `docker_litellm` (docker_logs
      # type) để đọc stdout LiteLLM container. LiteLLM dùng logging driver
      # json-file (không phải syslog), nên phải qua Docker API để lấy log.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # NARROW bind cho df probe data disk. KHÔNG bind rootfs (bảo vệ secrets
      # khỏi Vector container — combined với docker.sock = takeover primitive).
      # rslave để thấy nested mount khi /opt/ragstack/data là separate FS.
      - /opt/ragstack/data:/host/data:ro,rslave
    depends_on:
      - victorialogs
      - nats

  # NATS JetStream — Vector tap stream (WARN+) → indexer worker.
  # Single-node, file-backed. Subject: logs.warn (filter applied at Vector sink).
  nats:
    image: nats:${NATS_IMAGE_TAG:-2.10-alpine}
    container_name: ragstack-nats
    restart: unless-stopped
    command:
      - "-js"
      - "-sd=/data"
      - "-m=8222"
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring
    volumes:
      - ./data/nats:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Custom semantic MCP — FastMCP server exposing search_log_templates over Qdrant.
  # Pair with official mcp-vl (LogsQL/discovery); this one adds semantic search
  # over Drain3-clustered templates which mcp-vl cannot do.
  # Also hosts /auth/verify endpoint that Caddy `forward_auth` calls to gate both
  # /mcp/vl/* and /mcp/semantic/* routes — central token table for the two MCPs.
  mcp-semantic:
    build: ../mcp-semantic
    container_name: ragstack-mcp-semantic
    restart: unless-stopped
    profiles: [chat, mcp]   # available in both chat (via mcpo) and standalone mcp profiles
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: log_templates
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_MOCK: ${EMBED_MOCK:-false}
      # Multi-user Bearer table: "user1:sk-aaa,user2:sk-bbb,...". Empty +
      # MCP_ALLOW_ANON unset = fail-closed (every /auth/verify request denied).
      MCP_BEARER_TOKENS: ${MCP_BEARER_TOKENS:-}
      MCP_ALLOW_ANON: ${MCP_ALLOW_ANON:-false}
      # Public base for building clickable VMUI links inside tool responses.
      VMUI_BASE_URL: ${VMUI_BASE_URL:-http://app.local}
      AUDIT_LOG_PATH: /var/log/onelog-audit/mcp-semantic.log
      HOST: 0.0.0.0
      PORT: "9000"
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:9002:9000"
    volumes:
      - ./data/audit:/var/log/onelog-audit

  # VictoriaMetrics single-node — scrapes /metrics from OneLog components so
  # ops can see ingest rate, indexer batch lag, Qdrant collection size, etc.
  # Opt-in via profile [monitoring]. Grafana provisioning wires it as a
  # datasource when both profiles are up. Retention 30d.
  victoriametrics:
    image: victoriametrics/victoria-metrics:${VM_IMAGE_TAG:-latest}
    container_name: ragstack-vm
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - "-storageDataPath=/vm-data"
      - "-retentionPeriod=${VM_RETENTION:-30d}"
      - "-promscrape.config=/etc/vm/scrape.yml"
      - "-httpListenAddr=:8428"
      - "-memory.allowedBytes=256MB"
    ports:
      - "127.0.0.1:8428:8428"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./victoriametrics/scrape.yml:/etc/vm/scrape.yml:ro
      - ./data/victoriametrics:/vm-data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # node-exporter — host-level metrics (CPU, RAM, network, disk I/O, load avg).
  # Reads /proc, /sys, and / via bind mounts (not network_mode: host) so the
  # container stays in the ragstack bridge network — VM scrapes via docker DNS
  # 'node-exporter:9101'. Network stats still reflect real host interfaces
  # because /host/proc/net is bind-mounted from the host.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ragstack-node-exporter
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - /:/rootfs:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--web.listen-address=:9101"

  # vmalert — evaluates LogsQL stats queries against VictoriaLogs, fires
  # to Alertmanager. Native VL datasource since vmalert v1.96+.
  vmalert:
    image: victoriametrics/vmalert:${VMALERT_IMAGE_TAG:-latest}
    container_name: ragstack-vmalert
    restart: unless-stopped
    profiles: [alerts]
    command:
      # For `type: vlogs` groups, vmalert appends `/select/logsql/stats_query`
      # to this base URL itself. Use root path of VictoriaLogs.
      - "-datasource.url=http://victorialogs:9428/"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/rules.yml"
      - "-evaluationInterval=30s"
      - "-rule.resendDelay=1m"
      - "-httpListenAddr=:8880"
      # GeneratorURL base — used in Alertmanager template "Rule" link so ops
      # jump straight to the firing rule page. Default assumes SSH tunnel /
      # local access; override via VMALERT_EXTERNAL_URL for VPN / public host.
      - "-external.url=${VMALERT_EXTERNAL_URL:-http://localhost:8880}"
    ports:
      - "127.0.0.1:8880:8880"
    volumes:
      - ./vmalert/rules.yml:/etc/vmalert/rules.yml:ro
    depends_on:
      - victorialogs
      - alertmanager

  # Alertmanager — dedupe / group / route fired alerts to Telegram.
  # Entrypoint renders __TELEGRAM_BOT_TOKEN__ + __TELEGRAM_CHAT_ID__ placeholders
  # from infra/.env via sed at container start. Run as root to avoid
  # /data permission issues on bind mount.
  #
  # ⚠ NOTE: `curl -X POST /-/reload` reloads /tmp/alertmanager.yml (rendered
  # at start) — NOT the bind-mounted source. Any edit to alertmanager.yml
  # requires `up -d --force-recreate alertmanager` to re-run sed.
  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_IMAGE_TAG:-latest}
    container_name: ragstack-alertmanager
    restart: unless-stopped
    profiles: [alerts]
    user: "0:0"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Re-use existing .env convention (was set up for the decommissioned agent).
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
      # Topic ID inside supergroup (0 = General/root). Set when group has Topics enabled.
      # Default topic for infra/system alerts (Issue alert topic).
      TELEGRAM_ALERT_THREAD_ID: ${TELEGRAM_ALERT_THREAD_ID:-0}
      # Separate topic for LLM cost/quota alerts (Quota alert topic) — routed
      # via receiver telegram-llm-cost, matcher team="llm-cost".
      TELEGRAM_ALERT_THREAD_ID_LLM_COST: ${TELEGRAM_ALERT_THREAD_ID_LLM_COST:-0}
      # Render .StartsAt.Local / .EndsAt.Local as Vietnam time (UTC+7) in template.
      TZ: Asia/Ho_Chi_Minh
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        sed -e "s|__TELEGRAM_BOT_TOKEN__|$$TELEGRAM_BOT_TOKEN|g" \
            -e "s|__TELEGRAM_CHAT_ID__|$$TELEGRAM_ALERT_CHAT_ID|g" \
            -e "s|__TELEGRAM_THREAD_ID__|$$TELEGRAM_ALERT_THREAD_ID|g" \
            -e "s|__TELEGRAM_THREAD_ID_LLM_COST__|$$TELEGRAM_ALERT_THREAD_ID_LLM_COST|g" \
            /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/data
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/data
      # Mount host tzdata so Go runtime can resolve Asia/Ho_Chi_Minh (TZ env
      # alone is insufficient — distroless image lacks /usr/share/zoneinfo).
      # Skip /etc/localtime mount (host may be UTC) — rely on TZ env instead.
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro

  # web: DECOMMISSIONED 2026-07-17 — KB pivoted to OpenWebUI native Knowledge.
  # Folder `web/` removed from repo. Legacy snapshot on branch `legacy-web`.
  #
  # Agent service — re-enabled 2026-07-02 with LiteLLM adapter (Phase 1 plan
  # 260701-1544). Talks to LLM providers directly via LiteLLM SDK, not through
  # litellm-proxy — that keeps latency low and avoids a second network hop.
  agent:
    build: ../agent
    container_name: ragstack-agent
    restart: unless-stopped
    profiles: [agent]
    environment:
      # LiteLLM provider selection
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4-5}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_ENABLE_PROMPT_CACHE: ${LLM_ENABLE_PROMPT_CACHE:-true}
      LLM_MOCK: ${LLM_MOCK:-false}
      # Provider keys — LiteLLM picks whichever matches LLM_MODEL prefix.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Legacy — honored as BC fallback in llm_client._resolve_model().
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      # Embeddings for query → Qdrant
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_MOCK: ${EMBED_MOCK:-false}
      # Datastore endpoints
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: log_templates
      VL_URL: http://victorialogs:9428
      # Alerting
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
      TELEGRAM_MOCK: ${TELEGRAM_MOCK:-false}
      HOST: 0.0.0.0
      PORT: "8080"
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - qdrant
      - victorialogs

  # Indexer worker — consumes NATS logs.warn, Drain3 cluster, embed → Qdrant.
  indexer:
    build: ../indexer
    container_name: ragstack-indexer
    restart: unless-stopped
    profiles: [indexer]   # opt-in: docker compose --profile indexer up -d
    environment:
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: logs.warn
      NATS_STREAM: LOGS
      NATS_DURABLE: indexer-v1
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: log_templates
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_MOCK: ${EMBED_MOCK:-false}
      BATCH_SIZE: "500"
      BATCH_WINDOW_S: "30"
      DRAIN_STATE_DIR: /data/drain_state
      METRICS_PORT: "9100"
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:9100:9100"   # Prometheus /metrics + /health
    volumes:
      - ./data/indexer:/data
    depends_on:
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started

  # MCP server official from VictoriaMetrics — 12 read-only LogsQL/discovery/stats
  # tools. Pinned to v1.9.0 from ghcr (Docker Hub image does not exist).
  # Auth gated by Caddy `forward_auth` to mcp-semantic:/auth/verify (single token
  # table). MCP_PASSTHROUGH_HEADERS keeps the Authorization header for traceability.
  mcp-vl:
    image: ghcr.io/victoriametrics/mcp-victorialogs:${MCPVL_IMAGE_TAG:-v1.9.0}
    container_name: ragstack-mcp-vl
    restart: unless-stopped
    profiles: [chat, mcp]   # available in both chat (via mcpo) and standalone mcp profiles
    environment:
      VL_INSTANCE_ENTRYPOINT: http://victorialogs:9428
      # v1.9.0 reads MCP_SERVER_MODE (not MCP_TRANSPORT); default stdio crash-loops
      # under docker. Streamable HTTP at /mcp — SSE mode caused mcpo httpx.ReadTimeout
      # reconnect loop burning 100% CPU (mcp-vl doesn't emit SSE keepalive → httpx
      # trips default read timeout ~15min → sse_reader respawn leaks coroutines).
      MCP_SERVER_MODE: http
      MCP_LISTEN_ADDR: ":8000"
      # Disable heavyweight documentation tool — keeps the surface focused on
      # query/hits/facets/stats for IDE assistants.
      MCP_DISABLED_TOOLS: documentation
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      - victorialogs

  # LiteLLM proxy — Phase 2, plan 260701-1544-llm-provider-abstraction.
  # OpenAI-compatible gateway routing to 4 providers with fallback + cost log.
  # Only reads infra/litellm/.env.llm (provider keys) — infra/.env exposes just
  # the master key + DB URL. Blast radius separation per RT-F1.
  litellm-proxy:
    image: ghcr.io/berriai/litellm:${LITELLM_IMAGE_TAG:-main-stable}
    container_name: ragstack-litellm
    restart: unless-stopped
    # Listed in both profiles so `--profile chat` alone brings up its dep
    # (openwebui → litellm-proxy). Otherwise compose fails validation with
    # "openwebui depends on undefined service litellm-proxy".
    profiles: [llm, chat]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/callbacks/custom_callbacks.py:/app/custom_callbacks.py:ro
    env_file:
      # Provider keys live here, chmod 0400 root:root. Missing file = fail-fast.
      - path: ./litellm/.env.llm
        required: true
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # DB backend disabled — Prisma doesn't honor Postgres search_path so
      # RT-F11 schema isolation would fail. Cost tracking via stdout JSON
      # → VictoriaLogs (V4). Virtual keys/budgets are in-memory only.
      # DATABASE_URL: ${LITELLM_DATABASE_URL:-}
      # STORE_MODEL_IN_DB: "True"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # No depends_on postgres — DB disabled (see general_settings comment).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # mcpo — MCP-to-OpenAPI bridge (Phase 3 addendum). OpenWebUI doesn't speak
  # MCP natively (SSE/Streamable HTTP) — mcpo proxies both mcp-vl + mcp-semantic
  # as OpenAPI REST endpoints that OpenWebUI can register under Workspace →
  # Tools. Config baked with token at container start via sed (mcpo doesn't
  # expand env vars in config.json).
  mcpo:
    image: ghcr.io/open-webui/mcpo:${MCPO_IMAGE_TAG:-main}
    container_name: ragstack-mcpo
    restart: unless-stopped
    profiles: [chat]
    volumes:
      - ./mcpo/config.template.json:/app/config.template.json:ro
    environment:
      MCP_TOKEN_OPENWEBUI: ${MCP_TOKEN_OPENWEBUI}
      MCPO_API_KEY: ${MCPO_API_KEY}
    # Substitute token at start (mcpo does not do env expansion in config.json)
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s|__MCP_TOKEN__|$$MCP_TOKEN_OPENWEBUI|g" /app/config.template.json > /tmp/config.json && \
        exec mcpo --config /tmp/config.json --host 0.0.0.0 --port 8080 --api-key "$$MCPO_API_KEY"
    ports:
      - "127.0.0.1:8091:8080"
    depends_on:
      - mcp-vl
      - mcp-semantic
      - caddy
    # mcpo discovers tools ONCE at startup (no retry). If upstream flaps at boot,
    # openapi paths stay empty forever → OpenWebUI sees 0 tools → LLM hallucinates
    # tool names. Healthcheck fails when any server has 0 paths, restart:unless-
    # stopped then kicks in → mcpo re-discovers on fresh process. start_period
    # covers cold start of mcp-vl + caddy.
    # Docker healthcheck only marks unhealthy — doesn't restart. `|| kill 1` exits
    # PID 1 (mcpo) so `restart: unless-stopped` kicks in and mcpo re-discovers
    # tools on fresh process.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,json,sys; [sys.exit(1) for s in ('onelog-vl','onelog-semantic') if not json.loads(urllib.request.urlopen(f'http://localhost:8080/{s}/openapi.json',timeout=3).read()).get('paths')]" || kill 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - default

  # OpenWebUI — Phase 3, plan 260701-1544-llm-provider-abstraction.
  # Team chat UI replacing Claude Desktop. Uses LiteLLM proxy as OpenAI-compat
  # backend, mounts MCP config for tool access to mcp-vl + mcp-semantic.
  # Local user auth (V1) — signup disabled after bootstrap (RT-F2).
  openwebui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_IMAGE_TAG:-main}
    container_name: ragstack-openwebui
    restart: unless-stopped
    profiles: [chat]   # opt-in: docker compose --profile chat up -d
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ./data/openwebui:/app/backend/data
      # MCP tools wired via mcpo bridge (see mcpo service above) — registered
      # manually in OpenWebUI Admin → Tools with OpenAPI URL. OpenWebUI doesn't
      # read mcp-config.json natively.
    environment:
      # Backend LLM = LiteLLM proxy (Phase 2). One virtual key, 4 models exposed.
      OPENAI_API_BASE_URL: http://litellm-proxy:4000/v1
      OPENAI_API_KEY: ${OPENWEBUI_LITELLM_VIRTUAL_KEY}
      ENABLE_OLLAMA_API: "false"

      # UI
      WEBUI_NAME: "OneLog Chat"
      DEFAULT_MODELS: "gemini-flash"
      DEFAULT_USER_ROLE: "user"

      # Signup locked from boot. First-run admin is created via the
      # "Create Admin Account" form (auto-shown when DB empty, bypasses
      # ENABLE_SIGNUP=false for user #0). After that only invites work.
      # OpenWebUI 0.10.x has no supported env-var bootstrap — do NOT try to
      # pass WEBUI_ADMIN_EMAIL/PASSWORD, they are ignored.
      ENABLE_SIGNUP: "false"
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}

      # MCP wired via mcpo bridge (separate service). Two paths to register:
      # 1. Auto — set TOOL_SERVER_CONNECTIONS env below (JSON array).
      # 2. Manual — user Settings → Tools → + Add Connection with URL
      #    http://mcpo:8080/onelog-vl (+ onelog-semantic), Bearer = MCPO_API_KEY.
      # Default '[]' (not empty) — OpenWebUI does json.loads() and empty string throws.
      TOOL_SERVER_CONNECTIONS: ${TOOL_SERVER_CONNECTIONS:-[]}
    # [RT-F13] service_started, NOT service_healthy — if 1 provider API is down
    # at reboot, LiteLLM liveness may flake and would deadlock OpenWebUI boot.
    # OpenWebUI retries at first request instead.
    depends_on:
      litellm-proxy:
        condition: service_started
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # step-ca — internal CA for issuing rsyslog mTLS client certs + Vector
  # server cert. Opt-in via profile [tls]. Bootstrap flow docs in
  # docs/deployment-mtls.md. Data persisted at ./data/step-ca (bootstrap once,
  # then treat as authoritative — do NOT re-init or you invalidate all issued certs).
  step-ca:
    image: smallstep/step-ca:${STEPCA_IMAGE_TAG:-0.28.1}
    container_name: ragstack-step-ca
    restart: unless-stopped
    profiles: [tls]
    environment:
      # Bootstrap parameters — read once on empty data volume. Change and
      # rebuild only if starting from a clean CA (destructive).
      DOCKER_STEPCA_INIT_NAME: "${STEPCA_NAME:-OneLog Internal CA}"
      DOCKER_STEPCA_INIT_DNS_NAMES: "${STEPCA_DNS:-step-ca,localhost}"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "${STEPCA_PROVISIONER:-onelog-ops}"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /home/step/secrets/password
    volumes:
      - ./data/step-ca:/home/step
    ports:
      - "127.0.0.1:9000:9000"

  caddy:
    image: caddy:${CADDY_IMAGE_TAG:-2-alpine}
    container_name: ragstack-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # Env passthrough — Caddyfile references {$VAR} which resolves against
    # container env, not compose env. Fail-fast (`:?`) prevents empty CIDR
    # matching everything.
    environment:
      ADMIN_ALLOW_CIDR: ${ADMIN_ALLOW_CIDR:?ADMIN_ALLOW_CIDR must be set}
      ADMIN_STRICT_CIDR: ${ADMIN_STRICT_CIDR:?ADMIN_STRICT_CIDR must be set for admin subdomain}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./mockups:/srv/mockups:ro

  # sqlite-web — browser UI cho webui.db. Read-only mount + basic auth.
  # Opt-in via profile [dbtools] để không expose surface khi không cần.
  # Truy cập: `docker compose --profile dbtools up -d sqlite-web` → http://127.0.0.1:8085
  # SSH tunnel từ workstation nếu muốn view từ xa (không bind 0.0.0.0).
  sqlite-web:
    image: coleifer/sqlite-web
    container_name: ragstack-sqlite-web
    restart: unless-stopped
    profiles: [dbtools]
    ports:
      - "127.0.0.1:8085:8080"
    volumes:
      # Read-only. Muốn edit trực tiếp thì tạm bỏ :ro và stop openwebui trước.
      - ./data/openwebui:/data:ro
    environment:
      SQLITE_WEB_PASSWORD: ${SQLITE_WEB_PASSWORD:-changeme}
    command:
      - sqlite_web
      - --host=0.0.0.0
      - --port=8080
      - --password
      - --read-only
      - /data/webui.db

  # Grafana OSS — LLM Cost Dashboard. Opt-in via profile [dashboard].
  # Bring up: docker compose --profile dashboard up -d grafana
  # Access: http://admin.webui.local/ (strict CIDR + Bearer + Grafana login)
  grafana:
    image: grafana/grafana-oss:${GRAFANA_IMAGE_TAG:-11.4.0}
    container_name: ragstack-grafana
    restart: unless-stopped
    profiles: [dashboard, monitoring]
    ports:
      - "127.0.0.1:3000:3000"
    # Public DNS — Host dùng systemd-resolved (127.0.0.53) mà container không
    # reach được → plugin install từ grafana.com fail. Set DNS công cộng cho
    # container. Không đụng host resolver.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - victorialogs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: ragstack
