# PoC stack for RAG Log Server (single-node, 3 demo servers)
# Bring up:  docker compose up -d
# Tear down: docker compose down
# Logs:      docker compose logs -f <service>

name: ragstack

services:
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: ragstack-vl
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=${VL_RETENTION:-7d}
      - -httpListenAddr=:9428
      - -memory.allowedBytes=512MB
    ports:
      - "127.0.0.1:9428:9428"   # HTTP API (web/agent)
    volumes:
      - ./data/victorialogs:/victoria-logs-data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9428/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragstack-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: ragstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s

  redis:
    image: redis:7-alpine
    container_name: ragstack-redis
    restart: unless-stopped
    profiles: [agent]   # only start when agent stack is needed (Phase 03+)
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data

  vector:
    image: timberio/vector:0.40.0-alpine
    container_name: ragstack-vector
    restart: unless-stopped
    ports:
      - "514:514/udp"           # syslog UDP (RFC3164) from servers
      - "6514:6514/tcp"         # syslog TCP (RFC5424) optional
      - "6515:6515/tcp"         # rsyslog JSON line-delimited (ECS-lite) — IP whitelist via firewall
      - "127.0.0.1:8686:8686"   # Vector API
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./data/vector:/var/lib/vector
    depends_on:
      - victorialogs
      - nats

  # NATS JetStream — Vector tap stream (WARN+) → indexer worker.
  # Single-node, file-backed. Subject: logs.warn (filter applied at Vector sink).
  nats:
    image: nats:2.10-alpine
    container_name: ragstack-nats
    restart: unless-stopped
    command:
      - "-js"
      - "-sd=/data"
      - "-m=8222"
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring
    volumes:
      - ./data/nats:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Custom semantic MCP — FastMCP server exposing search_log_templates over Qdrant.
  # Pair with official mcp-vl (LogsQL/discovery); this one adds semantic search
  # over Drain3-clustered templates which mcp-vl cannot do.
  # Also hosts /auth/verify endpoint that Caddy `forward_auth` calls to gate both
  # /mcp/vl/* and /mcp/semantic/* routes — central token table for the two MCPs.
  mcp-semantic:
    build: ../mcp-semantic
    container_name: ragstack-mcp-semantic
    restart: unless-stopped
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: log_templates
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_MOCK: ${EMBED_MOCK:-false}
      # Multi-user Bearer table: "user1:sk-aaa,user2:sk-bbb,...". Empty +
      # MCP_ALLOW_ANON unset = fail-closed (every /auth/verify request denied).
      MCP_BEARER_TOKENS: ${MCP_BEARER_TOKENS:-}
      MCP_ALLOW_ANON: ${MCP_ALLOW_ANON:-false}
      # Public base for building clickable VMUI links inside tool responses.
      VMUI_BASE_URL: ${VMUI_BASE_URL:-http://app.local}
      AUDIT_LOG_PATH: /var/log/onelog-audit/mcp-semantic.log
      HOST: 0.0.0.0
      PORT: "9000"
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:9002:9000"
    volumes:
      - ./data/audit:/var/log/onelog-audit

  # vmalert — evaluates LogsQL stats queries against VictoriaLogs, fires
  # to Alertmanager. Native VL datasource since vmalert v1.96+.
  vmalert:
    image: victoriametrics/vmalert:latest
    container_name: ragstack-vmalert
    restart: unless-stopped
    profiles: [alerts]
    command:
      # For `type: vlogs` groups, vmalert appends `/select/logsql/stats_query`
      # to this base URL itself. Use root path of VictoriaLogs.
      - "-datasource.url=http://victorialogs:9428/"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/rules.yml"
      - "-evaluationInterval=30s"
      - "-rule.resendDelay=1m"
      - "-httpListenAddr=:8880"
      # GeneratorURL base — used in Alertmanager template "Rule" link so ops
      # jump straight to the firing rule page. Default assumes SSH tunnel /
      # local access; override via VMALERT_EXTERNAL_URL for VPN / public host.
      - "-external.url=${VMALERT_EXTERNAL_URL:-http://localhost:8880}"
    ports:
      - "127.0.0.1:8880:8880"
    volumes:
      - ./vmalert/rules.yml:/etc/vmalert/rules.yml:ro
    depends_on:
      - victorialogs
      - alertmanager

  # Alertmanager — dedupe / group / route fired alerts to Telegram.
  # Entrypoint renders __TELEGRAM_BOT_TOKEN__ + __TELEGRAM_CHAT_ID__ placeholders
  # from infra/.env via sed at container start. Run as root to avoid
  # /data permission issues on bind mount.
  #
  # ⚠ NOTE: `curl -X POST /-/reload` reloads /tmp/alertmanager.yml (rendered
  # at start) — NOT the bind-mounted source. Any edit to alertmanager.yml
  # requires `up -d --force-recreate alertmanager` to re-run sed.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: ragstack-alertmanager
    restart: unless-stopped
    profiles: [alerts]
    user: "0:0"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Re-use existing .env convention (was set up for the decommissioned agent).
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
      # Render .StartsAt.Local / .EndsAt.Local as Vietnam time (UTC+7) in template.
      TZ: Asia/Ho_Chi_Minh
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        sed -e "s|__TELEGRAM_BOT_TOKEN__|$$TELEGRAM_BOT_TOKEN|g" \
            -e "s|__TELEGRAM_CHAT_ID__|$$TELEGRAM_ALERT_CHAT_ID|g" \
            /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/data
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/data
      # Mount host tzdata so Go runtime can resolve Asia/Ho_Chi_Minh (TZ env
      # alone is insufficient — distroless image lacks /usr/share/zoneinfo).
      # Skip /etc/localtime mount (host may be UTC) — rely on TZ env instead.
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro

  # ────────────────────────────────────────────────────────────────────────
  # DECOMMISSIONED 2026-06-24 — MCP-only rollout (Phase 02)
  # ────────────────────────────────────────────────────────────────────────
  # The Next.js web UI + FastAPI agent (with server-side Anthropic API) were
  # replaced by Claude Desktop + MCP (mcp-vl + mcp-semantic). 5 ops use their
  # Claude Team subscription, eliminating the duplicate LLM cost.
  #
  # CODE INTACT: folders `web/` and `agent/` stay on master for cheap resurrect.
  # Branch `legacy-web` snapshots the last bootable state.
  #
  # RESURRECT (see plans/260623-2041-mcp-only-rollout/phase-03-review-checkpoint.md):
  #   1. Uncomment the two blocks below (web + agent)
  #   2. Set ANTHROPIC_API_KEY (or OPENAI_API_KEY) in .env
  #   3. `docker compose --profile web --profile agent up -d`
  #   4. Smoke: curl http://app.local/chat → 200
  # Quick drill: `infra/scripts/resurrect-drill.sh`
  # ────────────────────────────────────────────────────────────────────────
  #
  # web:
  #   build: ../web
  #   container_name: ragstack-web
  #   restart: unless-stopped
  #   profiles: [web]
  #   environment:
  #     AGENT_URL: http://agent:8080
  #     VL_URL: http://victorialogs:9428
  #     QDRANT_URL: http://qdrant:6333
  #     DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/rag
  #     NODE_ENV: production
  #   ports:
  #     - "127.0.0.1:3000:3000"
  #
  # agent:
  #   build: ../agent
  #   container_name: ragstack-agent
  #   restart: unless-stopped
  #   profiles: [agent]
  #   environment:
  #     ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  #     ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
  #     LLM_MOCK: ${LLM_MOCK:-false}
  #     HTTPS_PROXY: ${HTTPS_PROXY:-}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  #     EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
  #     EMBED_MOCK: ${EMBED_MOCK:-false}
  #     QDRANT_URL: http://qdrant:6333
  #     QDRANT_API_KEY: ${QDRANT_API_KEY}
  #     QDRANT_COLLECTION: log_templates
  #     VL_URL: http://victorialogs:9428
  #     WEB_URL: http://web:3000
  #     TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  #     TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
  #     TELEGRAM_MOCK: ${TELEGRAM_MOCK:-false}
  #     HOST: 0.0.0.0
  #     PORT: "8080"
  #     LOG_LEVEL: INFO
  #   ports:
  #     - "127.0.0.1:8080:8080"
  #   depends_on:
  #     - qdrant
  #     - victorialogs

  # Indexer worker — consumes NATS logs.warn, Drain3 cluster, embed → Qdrant.
  indexer:
    build: ../indexer
    container_name: ragstack-indexer
    restart: unless-stopped
    profiles: [indexer]   # opt-in: docker compose --profile indexer up -d
    environment:
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: logs.warn
      NATS_STREAM: LOGS
      NATS_DURABLE: indexer-v1
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: log_templates
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_MOCK: ${EMBED_MOCK:-false}
      BATCH_SIZE: "500"
      BATCH_WINDOW_S: "30"
      DRAIN_STATE_DIR: /data/drain_state
      METRICS_PORT: "9100"
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:9100:9100"   # Prometheus /metrics + /health
    volumes:
      - ./data/indexer:/data
    depends_on:
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started

  # MCP server official from VictoriaMetrics — 12 read-only LogsQL/discovery/stats
  # tools. Pinned to v1.9.0 from ghcr (Docker Hub image does not exist).
  # Auth gated by Caddy `forward_auth` to mcp-semantic:/auth/verify (single token
  # table). MCP_PASSTHROUGH_HEADERS keeps the Authorization header for traceability.
  mcp-vl:
    image: ghcr.io/victoriametrics/mcp-victorialogs:v1.9.0
    container_name: ragstack-mcp-vl
    restart: unless-stopped
    environment:
      VL_INSTANCE_ENTRYPOINT: http://victorialogs:9428
      # v1.9.0 reads MCP_SERVER_MODE (not MCP_TRANSPORT); default stdio crash-loops
      # under docker. Set sse so the container exposes /sse + /message over HTTP.
      MCP_SERVER_MODE: sse
      MCP_LISTEN_ADDR: ":8000"
      # Disable heavyweight documentation tool — keeps the surface focused on
      # query/hits/facets/stats for IDE assistants.
      MCP_DISABLED_TOOLS: documentation
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      - victorialogs

  # LiteLLM proxy — Phase 2, plan 260701-1544-llm-provider-abstraction.
  # OpenAI-compatible gateway routing to 4 providers with fallback + cost log.
  # Only reads infra/litellm/.env.llm (provider keys) — infra/.env exposes just
  # the master key + DB URL. Blast radius separation per RT-F1.
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ragstack-litellm
    restart: unless-stopped
    profiles: [llm]   # opt-in: docker compose --profile llm up -d
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/callbacks/custom_callbacks.py:/app/custom_callbacks.py:ro
    env_file:
      # Provider keys live here, chmod 0400 root:root. Missing file = fail-fast.
      - path: ./litellm/.env.llm
        required: true
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # DB backend disabled — Prisma doesn't honor Postgres search_path so
      # RT-F11 schema isolation would fail. Cost tracking via stdout JSON
      # → VictoriaLogs (V4). Virtual keys/budgets are in-memory only.
      # DATABASE_URL: ${LITELLM_DATABASE_URL:-}
      # STORE_MODEL_IN_DB: "True"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # No depends_on postgres — DB disabled (see general_settings comment).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # OpenWebUI — Phase 3, plan 260701-1544-llm-provider-abstraction.
  # Team chat UI replacing Claude Desktop. Uses LiteLLM proxy as OpenAI-compat
  # backend, mounts MCP config for tool access to mcp-vl + mcp-semantic.
  # Local user auth (V1) — signup disabled after bootstrap (RT-F2).
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ragstack-openwebui
    restart: unless-stopped
    profiles: [chat]   # opt-in: docker compose --profile chat up -d
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ./data/openwebui:/app/backend/data
      - ./openwebui/mcp-config.json:/app/backend/data/mcp-config.json:ro
    environment:
      # Backend LLM = LiteLLM proxy (Phase 2). One virtual key, 4 models exposed.
      OPENAI_API_BASE_URL: http://litellm-proxy:4000/v1
      OPENAI_API_KEY: ${OPENWEBUI_LITELLM_VIRTUAL_KEY}
      ENABLE_OLLAMA_API: "false"

      # UI
      WEBUI_NAME: "OneLog Chat"
      DEFAULT_MODELS: "gemini-flash"
      DEFAULT_USER_ROLE: "user"

      # [RT-F2] Signup locked from boot. Race condition where "first visitor
      # gets admin" is impossible on LAN. Admin created via WEBUI_AUTH ENV
      # once, then rely on invite flow. Unset the ADMIN_* vars after bootstrap
      # is verified (they only apply when DB is empty).
      ENABLE_SIGNUP: "false"
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      # Uncomment for first-run bootstrap, then re-comment and restart:
      # WEBUI_ADMIN_EMAIL: ${OPENWEBUI_BOOTSTRAP_ADMIN_EMAIL:-}
      # WEBUI_ADMIN_PASSWORD: ${OPENWEBUI_BOOTSTRAP_ADMIN_PASSWORD:-}

      # MCP native support (v0.5+). Falls back to OpenWebUI Functions if this
      # proves flaky in prod (RT-F6 — path documented in phase-03 Step 2b).
      ENABLE_MCP: "true"
      MCP_CONFIG_PATH: /app/backend/data/mcp-config.json
      MCP_TOKEN_OPENWEBUI: ${MCP_TOKEN_OPENWEBUI}
    # [RT-F13] service_started, NOT service_healthy — if 1 provider API is down
    # at reboot, LiteLLM liveness may flake and would deadlock OpenWebUI boot.
    # OpenWebUI retries at first request instead.
    depends_on:
      litellm-proxy:
        condition: service_started
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: ragstack-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./mockups:/srv/mockups:ro

networks:
  default:
    name: ragstack
