[server]
root_url = http://admin.webui.local/

[security]
admin_user = admin
admin_password = $__env{GRAFANA_ADMIN_PASSWORD}
# Disable cookie_secure for LAN HTTP (no TLS). Enable when HTTPS ready.
cookie_secure = false

[auth.anonymous]
enabled = false

[users]
allow_sign_up = false
default_theme = dark

[analytics]
reporting_enabled = false
check_for_updates = false
