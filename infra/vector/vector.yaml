# Vector pipeline — PoC stage
# Sources: syslog UDP/TCP from 3 demo servers
# Sinks: VictoriaLogs (full), file (debug)
# Future Phase 02: + filter WARN+ → NATS → indexer

api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  syslog_udp:
    type: syslog
    address: 0.0.0.0:514
    mode: udp

  syslog_tcp:
    type: syslog
    address: 0.0.0.0:6514
    mode: tcp

  # rsyslog JSON line-delimited (ECS-lite schema) — for clients with existing
  # rsyslog omfwd JSON pipelines (e.g. forwarding to ELK/SIEM). Plain TCP, IP
  # whitelist enforced at firewall layer. TLS roadmap = separate plan.
  rsyslog_json_tcp:
    type: socket
    mode: tcp
    address: 0.0.0.0:6515
    decoding:
      codec: json
    framing:
      method: newline_delimited
    connection_limit: 1024
    # Rename auto-injected peer IP key to avoid colliding with JSON `.host`
    # field sent by client. Normalize transform reads `._peer_ip` → `host_ip`.
    host_key: "_peer_ip"

  # OpenWebUI SQLite size probe — mỗi 5m chạy script emit JSON size_bytes để
  # vmalert fire warning ở 2GB (query lag threshold) và critical ở 5GB (migrate).
  # Script tách riêng ra probe-openwebui-db.sh để tránh YAML multiline escape
  # (Vector 0.40 config validator strict với shell block scalar).
  # Output text raw, parse JSON bằng transform `openwebui_db_parse` bên dưới.
  openwebui_db_size:
    type: exec
    mode: scheduled
    scheduled:
      exec_interval_secs: 300
    command:
      - /bin/sh
      - /etc/vector/probe-openwebui-db.sh

transforms:
  enrich:
    type: remap
    inputs: [syslog_udp, syslog_tcp]
    source: |
      # Normalize syslog UDP/TCP → flat OneLog schema (unified with JSON path).
      .host = .hostname || "unknown"
      .host_ip = .source_ip || ""
      .severity = .severity || "info"
      .facility = .facility || ""
      .service = .appname || "unknown"
      ._msg = .message
      ._time = .timestamp
      # Drop verbose / duplicate fields so VL doesn't store them twice.
      del(.appname)
      del(.hostname)
      del(.source_ip)
      del(.source_type)
      del(.message)
      del(.timestamp)
      del(.version)
      del(.procid)

  # Map ECS-lite JSON input → flat OneLog schema (_time/host/severity/service/_msg).
  # Whitelist top-level fields = drop unknown keys → guards against schema drift.
  # Optional pass-through: labels.*, trace.* (preserve nested objects).
  # VRL note: path access (.foo) is infallible — never wrap with `??`. Use
  # `string()` (fallible cast) for type-safe coercion that justifies `??`.
  rsyslog_json_normalize:
    type: remap
    inputs: [rsyslog_json_tcp]
    source: |
      # Capture peer IP (server-side enrichment) + optional pass-through fields
      # BEFORE we rebuild `.`. Path access is infallible → no `??` needed.
      peer_ip = ._peer_ip
      labels = .labels
      trace = .trace

      # Type-safe extraction. string() is fallible on null/non-string → ?? chain OK.
      ts_str = string(.@timestamp) ?? string(.timestamp) ?? ""
      host = string(.host.name) ?? string(.host) ?? "unknown"
      level = string(.log.level) ?? string(.severity) ?? "info"
      facility = string(.log.syslog.facility) ?? ""
      service = string(.service.name) ?? string(.service) ?? "unknown"
      msg = string(.message) ?? string(.msg) ?? ""

      # Parse timestamp (RFC3339); fall back to ingest time if malformed/empty.
      # Vector 0.40 VRL has no string-accepting to_timestamp — use parse_timestamp.
      parsed_ts, err = parse_timestamp(ts_str, format: "%+")
      if err != null { parsed_ts = now() }

      # Downcase severity. `level` is string by construction → downcase infallible.
      severity_lc = downcase(level)

      # Rebuild event = drop every unknown top-level key.
      . = {
        "_time": parsed_ts,
        "host": host,
        "host_ip": string(peer_ip) ?? "",
        "severity": severity_lc,
        "facility": facility,
        "service": service,
        "_msg": msg,
      }
      # Strip sensitive keys khỏi labels.* — redact transform chỉ chạy regex trên
      # _msg, structured field cần denylist riêng. del() trên event path chuẩn VRL.
      # Denylist mở rộng: auth/cookie/session/access_token/refresh_token/client_secret/
      # private_key/passphrase để chặn mọi naming convention thông dụng.
      if labels != null {
        .labels = labels
        del(.labels.password)
        del(.labels.passwd)
        del(.labels.pwd)
        del(.labels.passphrase)
        del(.labels.token)
        del(.labels.api_key)
        del(.labels.apikey)
        del(.labels.api_secret)
        del(.labels.access_key)
        del(.labels.access_token)
        del(.labels.refresh_token)
        del(.labels.auth_token)
        del(.labels.client_secret)
        del(.labels.secret)
        del(.labels.secret_key)
        del(.labels.private_key)
        del(.labels.authorization)
        del(.labels.auth)
        del(.labels.cookie)
        del(.labels.session)
      }
      if trace != null { .trace = trace }

  # Exec source `openwebui_db_size` chỉ ra 1 dòng JSON/lần chạy trong `.message`.
  # Parse ra top-level fields để sink `_stream_fields: "service,host"` bind đúng.
  # KHÔNG đi qua `redact` (không có PII, event là metric monitor thuần).
  openwebui_db_parse:
    type: remap
    inputs: [openwebui_db_size]
    source: |
      raw = string(.message) ?? ""
      parsed, err = parse_json(raw)
      if err == null && is_object(parsed) {
        . = object!(parsed)
      } else {
        # Giữ raw msg + tag lỗi để debug — không drop event.
        ._msg = raw
        .service = "openwebui-db-monitor"
        .host = "logserver"
        .parse_error = string(err) ?? "unknown"
      }

  redact:
    # PII/secret redaction BEFORE log lands in VictoriaLogs
    # Anything downstream (MCP tools, indexer, agent) reads safe data.
    # Null-safe: nếu _msg thiếu (rare edge case từ syslog parser), fallback ""
    # để VRL không panic + drop event.
    # Performance: Vector dùng Rust `regex` crate (RE2, no backtracking → linear
    # time). ReDoS impossible; chỉ cần cap msg length để bound per-event CPU.
    type: remap
    inputs: [enrich, rsyslog_json_normalize]
    source: |
      msg = string(._msg) ?? ""
      # Cap msg length BEFORE regex — chống binary blob / multi-MB stack trace
      # đốt CPU. 64KB đủ cho stack trace bình thường.
      msg = slice!(msg, 0, 65536)
      original = msg

      # Email
      msg = replace(msg, r'[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}', "<EMAIL>")
      # IPv4 (keep public IPs, redact RFC1918 private)
      msg = replace(msg, r'\b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b', "<PRIV_IP>")
      # JWT (3 base64 segments)
      msg = replace(msg, r'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+', "<JWT>")
      # AWS access key
      msg = replace(msg, r'AKIA[0-9A-Z]{16}', "<AWS_KEY>")
      # Bearer token — không dùng regex backref vì Vector env-var interpolation
      # chạy trên config text trước (cả trong comment) → ký tự dollar number sẽ
      # bị Vector cố expand thành env var. Match cả prefix + token, replace literal.
      msg = replace(msg, r'(?i)authorization:\s*bearer\s+[A-Za-z0-9._-]+', "Authorization: Bearer <TOKEN>")
      # Password / secret fields — bắt buộc có `:` hoặc `=` làm delimiter để tránh
      # FP với log error kiểu "password is required". `\b` chống match `mypassword`.
      # Mở rộng: passphrase, secret, api_secret, private_key (dạng inline).
      msg = replace(msg, r'(?i)\b(password|passwd|pwd|passphrase|pass[_-]?phrase|secret|api[_-]?secret|private[_-]?key)\s*[:=]\s*\S+', "<REDACTED>")
      # GitHub PAT classic / OAuth / server / user: ghp_/gho_/ghs_/ghu_ + 36+ chars.
      msg = replace(msg, r'\bgh[opsu]_[A-Za-z0-9]{36,255}\b', "<GH_PAT>")
      # GitHub fine-grained PAT (vendor mới). Format chuẩn = 82 chars sau prefix
      # (22 id + `_` + 59 random), nhưng nới {40,255} để future-proof nếu GitHub
      # đổi length + chống test data lệch length.
      msg = replace(msg, r'\bgithub_pat_[A-Za-z0-9_]{40,255}\b', "<GH_PAT>")
      # AWS temporary credentials (STS) — prefix ASIA, ngoài AKIA của long-lived.
      msg = replace(msg, r'\bASIA[0-9A-Z]{16}\b', "<AWS_TEMP_KEY>")
      # LLM API keys: OpenAI (sk-, sk-proj-) và Anthropic (sk-ant-api03-).
      # Stack OneLog dùng cho mcp-semantic embed + indexer.
      msg = replace(msg, r'\bsk-(?:proj-|ant-api03-)?[A-Za-z0-9_\-]{20,255}\b', "<LLM_API_KEY>")
      # Telegram bot token (alertmanager → Telegram channel).
      # Format: <bot_id 9-10 digits>:<35-char base64-like>.
      msg = replace(msg, r'\b\d{9,10}:[A-Za-z0-9_\-]{35}\b', "<TG_BOT_TOKEN>")
      # DB connection string — replace toàn URL (đơn giản, KISS) thay vì giữ scheme.
      msg = replace(msg, r'(?i)(postgres|postgresql|mysql|mongodb|redis|amqp)://[^:\s]+:[^@\s]+@\S+', "<DB_URL>")
      # PEM private key block (single-line; app log thường strip newline).
      msg = replace(msg, r'-----BEGIN (RSA |EC |DSA |OPENSSH |ENCRYPTED |)PRIVATE KEY-----[^-]+-----END [^-]+-----', "<PRIVATE_KEY>")
      # Generic catch-all cho secret-shaped fields kiểu key=value / key: value.
      # Bắt token/api_key/access_key/secret_key/auth_token/client_secret/refresh_token
      # cho mọi vendor không có dedicated pattern. Underscore/dash đều OK (api_key|api-key).
      msg = replace(msg, r'(?i)\b(token|api[_-]?key|access[_-]?key|secret[_-]?key|auth[_-]?token|client[_-]?secret|refresh[_-]?token)\s*[:=]\s*\S+', "<TOKEN>")

      # Đánh dấu event đã bị redact để query observability:
      # `redacted:true | stats count() by (service)` xem service nào leak nhiều.
      if msg != original { .redacted = true }
      ._msg = msg

  # Tap: only WARN+ events feed the indexer worker via NATS.
  # Severity field is normalized in `enrich` from syslog priority — values like
  # "warning"/"err"/"crit"/"alert"/"emerg".
  warn_filter:
    type: filter
    inputs: [redact]
    condition: 'includes(["warning", "warn", "err", "error", "crit", "alert", "emerg"], string!(.severity))'

sinks:
  victorialogs:
    type: elasticsearch
    inputs: [redact]
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    mode: bulk
    api_version: v8
    healthcheck:
      enabled: false
    encoding:
      timestamp_format: rfc3339
    query:
      _msg_field: _msg
      _time_field: _time
      _stream_fields: "service,host"

  # Stream WARN+ to NATS JetStream so indexer can pull-consume in batches.
  # JSON encoding preserves _msg + service/host/severity for downstream Drain3.
  nats_warn:
    type: nats
    inputs: [warn_filter]
    url: nats://nats:4222
    subject: logs.warn
    encoding:
      codec: json

  debug_file:
    type: file
    inputs: [redact]
    path: /var/lib/vector/debug-%Y-%m-%d.log
    encoding:
      codec: json
