# Vector pipeline — PoC stage
# Sources: syslog UDP/TCP from 3 demo servers
# Sinks: VictoriaLogs (full), file (debug)
# Future Phase 02: + filter WARN+ → NATS → indexer

api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  syslog_udp:
    type: syslog
    address: 0.0.0.0:514
    mode: udp

  syslog_tcp:
    type: syslog
    address: 0.0.0.0:6514
    mode: tcp

  # rsyslog JSON line-delimited (ECS-lite schema) — for clients with existing
  # rsyslog omfwd JSON pipelines (e.g. forwarding to ELK/SIEM). Plain TCP, IP
  # whitelist enforced at firewall layer. TLS roadmap = separate plan.
  rsyslog_json_tcp:
    type: socket
    mode: tcp
    address: 0.0.0.0:6515
    decoding:
      codec: json
    framing:
      method: newline_delimited
    connection_limit: 1024

transforms:
  enrich:
    type: remap
    inputs: [syslog_udp, syslog_tcp]
    source: |
      # Normalize fields for VictoriaLogs
      .service = .appname || "unknown"
      .severity = .severity || "info"
      .host = .hostname || .source_ip || "unknown"
      ._msg = .message
      ._time = .timestamp
      # Drop verbose fields
      del(.appname)
      del(.hostname)
      del(.facility)
      del(.version)
      del(.procid)

  # Map ECS-lite JSON input → flat OneLog schema (_time/host/severity/service/_msg).
  # Whitelist top-level fields = drop unknown keys → guards against schema drift.
  # Optional pass-through: labels.*, trace.* (preserve nested objects).
  rsyslog_json_normalize:
    type: remap
    inputs: [rsyslog_json_tcp]
    source: |
      # Capture optional pass-through before we rebuild `.`
      labels = .labels ?? null
      trace = .trace ?? null

      # Extract with safe fallbacks (nested ECS-lite OR flat)
      ts_raw = .@timestamp ?? .timestamp ?? null
      host_str = .host.name ?? .host ?? "unknown"
      level_str = .log.level ?? .severity ?? "info"
      svc_str = .service.name ?? .service ?? "unknown"
      msg_str = .message ?? .msg ?? ""

      # Parse timestamp; fall back to ingest time if malformed/missing.
      parsed_ts, err = to_timestamp(ts_raw)
      if err != null { parsed_ts = now() }

      # Rebuild event = drop every unknown top-level key.
      . = {
        "_time": parsed_ts,
        "host": to_string(host_str) ?? "unknown",
        "severity": downcase(to_string(level_str) ?? "info") ?? "info",
        "service": to_string(svc_str) ?? "unknown",
        "_msg": to_string(msg_str) ?? "",
      }
      if labels != null { .labels = labels }
      if trace != null { .trace = trace }

  redact:
    # PII/secret redaction BEFORE log lands in VictoriaLogs
    # Anything downstream (MCP tools, indexer, agent) reads safe data.
    # Null-safe: nếu _msg thiếu (rare edge case từ syslog parser), fallback ""
    # để VRL không panic + drop event.
    type: remap
    inputs: [enrich, rsyslog_json_normalize]
    source: |
      msg = string(._msg) ?? ""
      # Email
      msg = replace(msg, r'[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}', "<EMAIL>")
      # IPv4 (keep public IPs, redact RFC1918 private)
      msg = replace(msg, r'\b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b', "<PRIV_IP>")
      # JWT (3 base64 segments)
      msg = replace(msg, r'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+', "<JWT>")
      # AWS access key
      msg = replace(msg, r'AKIA[0-9A-Z]{16}', "<AWS_KEY>")
      # Bearer token — không dùng regex backref vì Vector env-var interpolation
      # chạy trên config text trước (cả trong comment) → ký tự dollar number sẽ
      # bị Vector cố expand thành env var. Match cả prefix + token, replace literal.
      msg = replace(msg, r'(?i)authorization:\s*bearer\s+[A-Za-z0-9._-]+', "Authorization: Bearer <TOKEN>")
      # Password fields — match cả key + value, replace literal (mất casing gốc, OK cho redaction)
      msg = replace(msg, r'(?i)(password|passwd|pwd)["\s:=]+[^\s,;"]+', "password=<REDACTED>")
      ._msg = msg

  # Tap: only WARN+ events feed the indexer worker via NATS.
  # Severity field is normalized in `enrich` from syslog priority — values like
  # "warning"/"err"/"crit"/"alert"/"emerg".
  warn_filter:
    type: filter
    inputs: [redact]
    condition: 'includes(["warning", "warn", "err", "error", "crit", "alert", "emerg"], string!(.severity))'

sinks:
  victorialogs:
    type: elasticsearch
    inputs: [redact]
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    mode: bulk
    api_version: v8
    healthcheck:
      enabled: false
    encoding:
      timestamp_format: rfc3339
    query:
      _msg_field: _msg
      _time_field: _time
      _stream_fields: "service,host"

  # Stream WARN+ to NATS JetStream so indexer can pull-consume in batches.
  # JSON encoding preserves _msg + service/host/severity for downstream Drain3.
  nats_warn:
    type: nats
    inputs: [warn_filter]
    url: nats://nats:4222
    subject: logs.warn
    encoding:
      codec: json

  debug_file:
    type: file
    inputs: [redact]
    path: /var/lib/vector/debug-%Y-%m-%d.log
    encoding:
      codec: json
