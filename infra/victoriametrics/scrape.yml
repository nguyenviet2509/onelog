# VictoriaMetrics scrape config — pulls /metrics from OneLog components.
# Fed to victoriametrics service via -promscrape.config.
#
# Add scrape targets carefully: only endpoints that already expose Prometheus
# metrics natively. Adding Vector requires enabling its `prometheus_exporter`
# sink (not free — extra port + config). Deferred to Phase 2.

global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  # Indexer — Drain3 batch/embed worker. Already exposes /metrics on :9100
  # (see infra/docker-compose.yml → indexer.METRICS_PORT).
  - job_name: onelog-indexer
    static_configs:
      - targets: ["indexer:9100"]
        labels:
          component: indexer

  # VictoriaLogs — /metrics on :9428 (native Prometheus format).
  - job_name: onelog-victorialogs
    metrics_path: /metrics
    static_configs:
      - targets: ["victorialogs:9428"]
        labels:
          component: victorialogs

  # Qdrant — /metrics on :6333. Requires Bearer auth when QDRANT__SERVICE__API_KEY set.
  # Env expansion enabled via -promscrape.configEnvVarsExpansion on VM cmdline.
  - job_name: onelog-qdrant
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: "%{QDRANT_API_KEY}"
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          component: qdrant

  # vmalert — /metrics on :8880.
  - job_name: onelog-vmalert
    static_configs:
      - targets: ["vmalert:8880"]
        labels:
          component: vmalert

  # LiteLLM proxy — /metrics endpoint on :4000/metrics (Prometheus format
  # requires config.yaml litellm_settings.callbacks: [prometheus]).
  # /metrics requires Bearer auth unless litellm_settings.require_auth_for_metrics_endpoint: false.
  - job_name: onelog-litellm
    authorization:
      type: Bearer
      credentials: "%{LITELLM_MASTER_KEY}"
    static_configs:
      - targets: ["litellm-proxy:4000"]
        labels:
          component: litellm

  # VictoriaMetrics self-scrape.
  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]
        labels:
          component: victoriametrics

  # node-exporter — host CPU/RAM/network/disk. Container is on the ragstack
  # bridge network with /proc, /sys bind-mounted, so metrics reflect the real
  # host without needing network_mode: host.
  - job_name: onelog-host
    static_configs:
      - targets: ["node-exporter:9101"]
        labels:
          component: host
