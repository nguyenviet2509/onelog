# vmalert rule group — LogsQL stats expressions evaluated against VictoriaLogs.
#
# `type: vlogs` tells vmalert this group's `expr` is LogsQL (not MetricsQL),
# and to hit VL's `/select/logsql/stats_query` endpoint instead of metrics.
# vmalert injects the time window from `interval`, so `_time:Nm` MUST NOT
# appear in expr.

groups:
  - name: log-alerts
    type: vlogs
    interval: 5m
    rules:
      # LogsQL `| filter value:>N` keeps only series breaching threshold.
      # Without filter vmalert fires on count >= 1 — too noisy.
      #
      # Thresholds are SMOKE-TEST level (low) so the alert pipeline triggers
      # against current mock baseline. Production tuning: raise to numbers
      # well above MOCK_RATE × service-weight × severity-weight × window.
      - alert: SshBruteForce
        expr: 'service:mock-sshd "Failed password" | stats by (host) count() as value | filter value:>20'
        for: 1m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "SSH brute force suspected on {{ $labels.host }}"
          description: "{{ $value }} failed SSH login attempts in last 5m on {{ $labels.host }}"

      - alert: MysqlErrorBurst
        expr: 'service:mock-mysql severity:err | stats by (host) count() as value | filter value:>30'
        for: 1m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "MySQL error burst on {{ $labels.host }}"
          description: "{{ $value }} mysql err events in last 5m on {{ $labels.host }}"

      - alert: AuditLoginFailures
        expr: 'service:mock-audit "res=failed" | stats by (host) count() as value | filter value:>10'
        for: 1m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Audit login failures on {{ $labels.host }}"
          description: "{{ $value }} audit USER_LOGIN failures in last 5m on {{ $labels.host }}"

      - alert: NginxServerErrors
        expr: 'service:mock-nginx severity:err | stats by (host) count() as value | filter value:>100'
        for: 1m
        labels:
          severity: warning
          category: app
        annotations:
          summary: "Nginx 5xx burst on {{ $labels.host }}"
          description: "{{ $value }} nginx err events in last 5m on {{ $labels.host }}"

      # ───── Forensic rules (schema-driven: facility + host_ip) ─────────────
      # Thresholds tuned for the 5m group window — scale down vs 15m original
      # design (rules.yml-design 2026-06-25). Re-tune after 1-week baseline soak.

      # 1 attacker IP fail SSH across cluster = coordinated brute force.
      # `host_ip` = sender server IP (sshd host) → group by sender = same as
      # per-host SshBruteForce above. Real "multi-host same IP" requires
      # extracting the ATTACKER IP from the message body via LogsQL `extract`.
      # Format: "Failed password for <user> from <attacker_ip> port ..."
      - alert: SshFailMultiHostSameIp
        expr: 'facility:auth "Failed password" | extract "from <attacker_ip> port" | stats by (attacker_ip) count() as value | filter value:>10'
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "SSH brute force from {{ $labels.attacker_ip }}"
          description: "{{ $value }} failed SSH attempts in 5m from attacker {{ $labels.attacker_ip }} across cluster"

      # Kernel-level errors = hardware/driver/disk fail. Catch early before
      # silent data loss. facility:kern was dropped pre-schema-unify, now queryable.
      - alert: KernelErrorBurst
        expr: 'facility:kern severity:err | stats by (host) count() as value | filter value:>5'
        for: 1m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "Kernel errors on {{ $labels.host }}"
          description: "{{ $value }} kern err events in 5m on {{ $labels.host }} — check dmesg / hardware"

      # Sudo activity spike — audit insider threat / compromised account.
      # Matches both `sudo: ... COMMAND=...` (executed) and pam_unix sudo session.
      - alert: SudoEscalation
        expr: 'facility:auth _msg:"sudo:" _msg:"COMMAND=" | stats by (host) count() as value | filter value:>10'
        for: 1m
        labels:
          severity: warning
          category: audit
        annotations:
          summary: "Elevated sudo activity on {{ $labels.host }}"
          description: "{{ $value }} sudo commands executed in 5m on {{ $labels.host }}"

      # ───── Ops-driven rules (capacity + availability + audit) ─────────────
      # Brainstorm: plans/reports/brainstorm-260625-1003-vmalert-ops-rules.md
      # Coverage: 2 capacity + 2 availability + 1 audit. State metrics (CPU,
      # mem %, disk %) intentionally NOT here — delegate to Prometheus.

      # Disk full event — caught when an app's stderr surfaces ENOSPC. High
      # signal because the message only fires when something genuinely broke.
      - alert: DiskFullErrors
        expr: '(_msg:"No space left" OR _msg:"ENOSPC" OR _msg:"disk full") | stats by (host) count() as value | filter value:>1'
        for: 1m
        labels:
          severity: critical
          category: capacity
        annotations:
          summary: "Disk-full errors on {{ $labels.host }}"
          description: "{{ $value }} disk-full / ENOSPC events in 5m on {{ $labels.host }} — investigate / df -h"

      # Kernel OOM-killer fired = process killed for memory pressure. Catch
      # before users notice service degradation.
      - alert: OomKillEvent
        expr: 'facility:kern (_msg:"oom-killer" OR _msg:"Out of memory: Killed") | stats by (host) count() as value | filter value:>0'
        for: 1m
        labels:
          severity: critical
          category: capacity
        annotations:
          summary: "OOM-killer fired on {{ $labels.host }}"
          description: "{{ $value }} kernel OOM-kill events in 5m on {{ $labels.host }} — check process list / cgroup limits"

      # Systemd reports service failed (crash, core-dump, abnormal exit).
      # >2 in 5m strongly suggests a crashloop, not a one-off restart.
      - alert: SystemdServiceFailed
        expr: '_msg:"Failed with result" | stats by (host) count() as value | filter value:>2'
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Systemd service crashloop on {{ $labels.host }}"
          description: "{{ $value }} systemd 'Failed with result' events in 5m on {{ $labels.host }} — journalctl -xe"

      # DB client-side connection refused — surfaces when MySQL/PG/Redis is
      # unreachable. Threshold 5 to skip transient blips during planned restart.
      - alert: DbConnectionRefused
        expr: '(_msg:"connection refused" OR _msg:"could not connect to" OR _msg:"can''t connect to MySQL" OR _msg:"FATAL: connection") | stats by (host) count() as value | filter value:>5'
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Repeated DB connection refused on {{ $labels.host }}"
          description: "{{ $value }} DB conn-refused events in 5m on {{ $labels.host }} — check DB liveness + network"

      # New user added or existing user granted group membership = audit gold.
      # useradd/usermod/groupadd always log via facility:auth; matching these
      # binaries catches both creation + sudo-group additions without the
      # fragile literal-quote matching ("to group 'sudo'").
      - alert: NewUserOrSudoer
        expr: 'facility:auth (_msg:"new user:" OR _msg:"useradd" OR _msg:"usermod" OR _msg:"new group:" OR _msg:"groupadd") | stats by (host) count() as value | filter value:>0'
        for: 1m
        labels:
          severity: warning
          category: audit
        annotations:
          summary: "User/sudoer change on {{ $labels.host }}"
          description: "{{ $value }} useradd/usermod/group-change events in 5m on {{ $labels.host }} — verify intentional"
