# vmalert rule groups — LogsQL stats expressions against VictoriaLogs.
#
# `type: vlogs` tells vmalert the `expr` is LogsQL; vmalert injects the time
# window from `interval` so `_time:Nm` MUST NOT appear in expr.
#
# Two groups split by latency vs detection-style trade-off:
#   • log-alerts-instant (interval=30s, for=0s): single-event rules where ANY
#     occurrence is actionable (OOM, disk full, new sudoer). Threshold mostly >0.
#     Sub-1m latency. Alertmanager group_by + repeat_interval=1h prevents spam.
#   • log-alerts-burst   (interval=5m,  for=1m): trend/threshold rules needing
#     enough samples to distinguish signal from noise (SSH brute force, conn
#     refused spikes, crashloop). 5-6m latency by design.
#
# Threshold tuning protocol: observe baseline 1 week, set threshold = 2 × p95.

groups:
  # ─────────────────────────────────────────────────────────────────────────
  # INSTANT — sub-1m latency, threshold >0 / fire on first occurrence
  # ─────────────────────────────────────────────────────────────────────────
  - name: log-alerts-instant
    type: vlogs
    interval: 30s
    rules:
      # Kernel OOM-killer fired = process killed for memory pressure. Every
      # event = real incident, no waiting.
      - alert: OomKillEvent
        expr: 'facility:kern (_msg:"oom-killer" OR _msg:"Out of memory: Killed") | stats by (host) count() as value | filter value:>0'
        for: 0s
        labels:
          severity: critical
          category: capacity
        annotations:
          summary: "OOM-killer fired on {{ $labels.host }}"
          description: "Kernel OOM-kill event on {{ $labels.host }} — check process list / cgroup limits"

      # Disk full event surfaces từ app stderr. First ENOSPC = đã broken.
      - alert: DiskFullErrors
        expr: '(_msg:"No space left" OR _msg:"ENOSPC" OR _msg:"disk full") | stats by (host) count() as value | filter value:>0'
        for: 0s
        labels:
          severity: critical
          category: capacity
        annotations:
          summary: "Disk-full error on {{ $labels.host }}"
          description: "ENOSPC / disk-full event on {{ $labels.host }} — investigate / df -h"

      # User creation / sudoer modification = audit event, rare and high-signal.
      - alert: NewUserOrSudoer
        expr: 'facility:auth (_msg:"new user:" OR _msg:"useradd" OR _msg:"usermod" OR _msg:"new group:" OR _msg:"groupadd") | stats by (host) count() as value | filter value:>0'
        for: 0s
        labels:
          severity: warning
          category: audit
        annotations:
          summary: "User/sudoer change on {{ $labels.host }}"
          description: "useradd/usermod/group-change event on {{ $labels.host }} — verify intentional"

  # ─────────────────────────────────────────────────────────────────────────
  # BURST — 5m window, threshold >N to confirm pattern
  # ─────────────────────────────────────────────────────────────────────────
  - name: log-alerts-burst
    type: vlogs
    interval: 5m
    rules:
      # Per-host SSH brute force. Per-attacker version below catches cross-host.
      - alert: SshBruteForce
        expr: 'service:mock-sshd "Failed password" | stats by (host) count() as value | filter value:>20'
        for: 1m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "SSH brute force suspected on {{ $labels.host }}"
          description: "{{ $value }} failed SSH login attempts in last 5m on {{ $labels.host }}"

      - alert: MysqlErrorBurst
        expr: 'service:mock-mysql severity:err | stats by (host) count() as value | filter value:>30'
        for: 1m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "MySQL error burst on {{ $labels.host }}"
          description: "{{ $value }} mysql err events in last 5m on {{ $labels.host }}"

      - alert: AuditLoginFailures
        expr: 'service:mock-audit "res=failed" | stats by (host) count() as value | filter value:>10'
        for: 1m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Audit login failures on {{ $labels.host }}"
          description: "{{ $value }} audit USER_LOGIN failures in last 5m on {{ $labels.host }}"

      - alert: NginxServerErrors
        expr: 'service:mock-nginx severity:err | stats by (host) count() as value | filter value:>100'
        for: 1m
        labels:
          severity: warning
          category: app
        annotations:
          summary: "Nginx 5xx burst on {{ $labels.host }}"
          description: "{{ $value }} nginx err events in last 5m on {{ $labels.host }}"

      # 1 attacker IP fail SSH across cluster = coordinated brute force.
      # Pattern: "Failed password for <user> from <attacker_ip> port ..."
      - alert: SshFailMultiHostSameIp
        expr: 'facility:auth "Failed password" | extract "from <attacker_ip> port" | stats by (attacker_ip) count() as value | filter value:>10'
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "SSH brute force from {{ $labels.attacker_ip }}"
          description: "{{ $value }} failed SSH attempts in 5m from attacker {{ $labels.attacker_ip }} across cluster"

      # Kernel-level errs (non-OOM) — need burst pattern, single err có thể benign.
      - alert: KernelErrorBurst
        expr: 'facility:kern severity:err | stats by (host) count() as value | filter value:>5'
        for: 1m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "Kernel errors on {{ $labels.host }}"
          description: "{{ $value }} kern err events in 5m on {{ $labels.host }} — check dmesg / hardware"

      # Sudo spike — anomalous frequency suggests compromise / insider threat.
      - alert: SudoEscalation
        expr: 'facility:auth _msg:"sudo:" _msg:"COMMAND=" | stats by (host) count() as value | filter value:>10'
        for: 1m
        labels:
          severity: warning
          category: audit
        annotations:
          summary: "Elevated sudo activity on {{ $labels.host }}"
          description: "{{ $value }} sudo commands executed in 5m on {{ $labels.host }}"

      # Systemd reports service failed repeatedly = crashloop.
      - alert: SystemdServiceFailed
        expr: '_msg:"Failed with result" | stats by (host) count() as value | filter value:>2'
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Systemd service crashloop on {{ $labels.host }}"
          description: "{{ $value }} systemd 'Failed with result' events in 5m on {{ $labels.host }} — journalctl -xe"

      # DB client conn refused repeats — single blip ignored, ≥6 in 5m = real.
      - alert: DbConnectionRefused
        expr: '(_msg:"connection refused" OR _msg:"could not connect to" OR _msg:"can''t connect to MySQL" OR _msg:"FATAL: connection") | stats by (host) count() as value | filter value:>5'
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Repeated DB connection refused on {{ $labels.host }}"
          description: "{{ $value }} DB conn-refused events in 5m on {{ $labels.host }} — check DB liveness + network"
