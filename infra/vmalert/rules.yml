# vmalert rule groups — LogsQL stats expressions against VictoriaLogs.
#
# `type: vlogs` tells vmalert the `expr` is LogsQL; vmalert injects the time
# window from `interval` so `_time:Nm` MUST NOT appear in expr.
#
# Two groups split by latency vs detection-style trade-off:
#   • log-alerts-instant (interval=30s, for=0s): single-event rules where ANY
#     occurrence is actionable (OOM, disk full, new sudoer). Threshold mostly >0.
#     Sub-1m latency. Alertmanager group_by + repeat_interval=1h prevents spam.
#   • log-alerts-burst   (interval=5m,  for=1m): trend/threshold rules needing
#     enough samples to distinguish signal from noise (SSH brute force, conn
#     refused spikes, crashloop). 5-6m latency by design.
#
# Threshold tuning protocol: observe baseline 1 week, set threshold = 2 × p95.
#
# Facility caveat: user-space syslog calls (incl `logger -p kern.*`) get
# remapped to facility=user by Linux. Rules now match by `service:` tag or
# message pattern instead of `facility:` to stay forwarding-agnostic.

groups:
  # ─────────────────────────────────────────────────────────────────────────
  # INSTANT — sub-1m latency, threshold >0 / fire on first occurrence
  # ─────────────────────────────────────────────────────────────────────────
  - name: log-alerts-instant
    type: vlogs
    interval: 30s
    rules:
      # Kernel OOM-killer fired = process killed for memory pressure. Every
      # event = real incident, no waiting.
      # NOTE: dropped `facility:kern` filter — Linux remaps user-space syslog to
      # facility=user even with -p kern.*, so forwarded kernel-themed logs miss.
      # Message pattern "oom-killer" / "Out of memory: Killed" is specific enough.
      - alert: OomKillEvent
        expr: '(_msg:"oom-killer" OR _msg:"Out of memory: Killed") | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>0'
        for: 0s
        labels:
          severity: critical
          category: capacity
          notify_style: event   # alertmanager skip RESOLVED notif for one-shot events
        annotations:
          summary: "OOM-killer fired on {{ $labels.host }}"
          description: "Kernel OOM-kill event on {{ $labels.host }} — check process list / cgroup limits"

      # Disk full event surfaces từ app stderr. First ENOSPC = đã broken.
      - alert: DiskFullErrors
        expr: '(_msg:"No space left" OR _msg:"ENOSPC" OR _msg:"disk full") | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>0'
        for: 0s
        labels:
          severity: critical
          category: capacity
          notify_style: event
        annotations:
          summary: "Disk-full error on {{ $labels.host }}"
          description: "ENOSPC / disk-full event on {{ $labels.host }} — investigate / df -h"

      # User creation / sudoer modification = audit event, rare and high-signal.
      # NOTE: facility filter dropped (syslog forwarding can remap auth → user).
      # Match by service tag (useradd/groupadd/usermod) OR explicit msg patterns.
      - alert: NewUserOrSudoer
        expr: '(service:useradd OR service:usermod OR service:groupadd OR _msg:"new user:" OR _msg:"new group:") | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>0'
        for: 0s
        labels:
          severity: warning
          category: audit
          notify_style: event
        annotations:
          summary: "User/sudoer change on {{ $labels.host }}"
          description: "useradd/usermod/group-change event on {{ $labels.host }} — verify intentional"

      # lsphp segfault — 1 event = PHP extension bug / OPcache corruption.
      # Plan 260713-1520 Phase 1a. Instant group (30s eval) + notify_style=event
      # để tránh RESOLVED noise ("không thêm segfault trong 5m" ≠ "đã fix").
      - alert: LsphpSegfault
        expr: |
          (_msg:"segfault" OR _msg:"segmentation fault") (service:lsphp OR service:litespeed OR _msg:"lsphp") _time:1m
            | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg
            | filter value:>0
        for: 0s
        labels:
          severity: critical
          category: availability
          component: lsphp
          notify_style: event
        annotations:
          summary: "lsphp segfault trên {{ $labels.host }} ({{ $value }})"
          description: "PHP extension bug hoặc OPcache corruption. journalctl -xe / core dump."

  # ─────────────────────────────────────────────────────────────────────────
  # BURST — 5m window, threshold >N to confirm pattern
  # ─────────────────────────────────────────────────────────────────────────
  - name: log-alerts-burst
    type: vlogs
    interval: 5m
    rules:
      # Per-host SSH brute force. Per-attacker version below catches cross-host.
      # Prod-only matcher (rollback plan 260713-1520 phase 06 mock inclusion —
      # mock baseline > threshold gây fire vĩnh viễn; mock alive verify qua
      # WarnEventsStale rule ở semantic-pipeline group).
      - alert: SshBruteForce
        expr: '(service:sshd OR service:ssh) "Failed password" | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>20'
        for: 1m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "SSH brute force suspected on {{ $labels.host }}"
          description: "{{ $value }} failed SSH login attempts in last 5m on {{ $labels.host }}"

      # Prod-only matcher (mock excluded — baseline ~60 err/5m > threshold 30
      # gây fire vĩnh viễn trên srv-01/02).
      - alert: MysqlErrorBurst
        expr: '(service:mysqld OR service:mysql) severity:err | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>30'
        for: 1m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "MySQL error burst on {{ $labels.host }}"
          description: "{{ $value }} mysql err events in last 5m on {{ $labels.host }}"

      # Prod matcher: auditd tag (Linux auditd → syslog). Mock-audit loại vì
      # baseline > threshold.
      - alert: AuditLoginFailures
        expr: '(service:auditd OR service:audit) "res=failed" | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>10'
        for: 1m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Audit login failures on {{ $labels.host }}"
          description: "{{ $value }} audit USER_LOGIN failures in last 5m on {{ $labels.host }}"

      # Renamed từ NginxServerErrors (plan 260713-1520 phase 06) vì prod dùng
      # OpenLitespeed. Prod-only matcher (mock-nginx loại — anti fire vĩnh viễn).
      - alert: WebServerErrorBurst
        expr: '(service:litespeed OR service:openlitespeed OR service:nginx) severity:err | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>100'
        for: 1m
        labels:
          severity: warning
          category: app
        annotations:
          summary: "Web server 5xx burst on {{ $labels.host }}"
          description: "{{ $value }} web err events in last 5m on {{ $labels.host }} — check OLS/nginx error log"

      # 1 attacker IP fail SSH across cluster = coordinated brute force.
      # Pattern: "Failed password for <user> from <attacker_ip> port ..."
      # Prod-only matcher (mock-sshd loại — anti fire vĩnh viễn).
      - alert: SshFailMultiHostSameIp
        expr: '(service:sshd OR service:ssh) "Failed password" | extract "from <attacker_ip> port" | stats by (attacker_ip) count() as value, row_any(_msg) as sample_msg | filter value:>10'
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "SSH brute force from {{ $labels.attacker_ip }}"
          description: "{{ $value }} failed SSH attempts in 5m from attacker {{ $labels.attacker_ip }} across cluster"

      # Kernel-level errs (non-OOM) — need burst pattern, single err có thể benign.
      # facility:kern dropped (forwarding remap) → match by service:kernel tag.
      - alert: KernelErrorBurst
        expr: 'service:kernel severity:err | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>5'
        for: 1m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "Kernel errors on {{ $labels.host }}"
          description: "{{ $value }} kern err events in 5m on {{ $labels.host }} — check dmesg / hardware"

      # Sudo spike — anomalous frequency suggests compromise / insider threat.
      # facility:auth dropped (forwarding remap) → match service:sudo OR sudo msg.
      - alert: SudoEscalation
        expr: '(service:sudo OR _msg:"sudo:") _msg:"COMMAND=" | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>10'
        for: 1m
        labels:
          severity: warning
          category: audit
        annotations:
          summary: "Elevated sudo activity on {{ $labels.host }}"
          description: "{{ $value }} sudo commands executed in 5m on {{ $labels.host }}"

      # Systemd reports service failed repeatedly = crashloop.
      - alert: SystemdServiceFailed
        expr: '_msg:"Failed with result" | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>2'
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Systemd service crashloop on {{ $labels.host }}"
          description: "{{ $value }} systemd 'Failed with result' events in 5m on {{ $labels.host }} — journalctl -xe"

      # DB client conn refused repeats — single blip ignored, ≥6 in 5m = real.
      - alert: DbConnectionRefused
        expr: '(_msg:"connection refused" OR _msg:"could not connect to" OR _msg:"can''t connect to MySQL" OR _msg:"FATAL: connection") | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg | filter value:>5'
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Repeated DB connection refused on {{ $labels.host }}"
          description: "{{ $value }} DB conn-refused events in 5m on {{ $labels.host }} — check DB liveness + network"

      # ────────── Plan 260713-1520 Phase 1a — web stack + FD selfcheck ──────────
      # NOTE: `_time:5m` explicit — vmalert vlogs không inject window (commit d55a6d6).

      # File descriptor exhaustion: EMFILE / ulimit chạm. Generic pattern.
      - alert: FileDescriptorExhaustion
        expr: |
          (_msg:"Too many open files" OR _msg:"EMFILE" OR _msg:"open file descriptor limit") _time:5m
            | stats by (host, host_ip, service) count() as value, row_any(_msg) as sample_msg
            | filter value:>3
        for: 1m
        labels:
          severity: warning
          category: capacity
        annotations:
          summary: "FD exhaustion {{ $labels.service }} @ {{ $labels.host }}"
          description: "Nâng ulimit -n hoặc systemd LimitNOFILE. Check /proc/<pid>/limits."

      # php-fpm worker pool exhaustion — php-fpm log format (allow variant wording).
      - alert: PhpFpmWorkerExhaustion
        expr: |
          (_msg:"server reached pm.max_children" OR _msg:"reached pm.max_children") _time:5m
            | stats by (host, host_ip) count() as value, row_any(_msg) as sample_msg
            | filter value:>0
        for: 1m
        labels:
          severity: warning
          category: capacity
          component: php-fpm
        annotations:
          summary: "php-fpm worker exhaustion trên {{ $labels.host }}"
          description: "Pool đầy → user-facing latency spike. Nâng pm.max_children hoặc thêm pool."

  # ─────────────────────────────────────────────────────────────────────────
  # OPENWEBUI SQLITE — capacity trending, event source = vector exec probe
  # (openwebui_db_size, every 5m). SQLite = 1 writer → latency growth theo file.
  # ─────────────────────────────────────────────────────────────────────────
  - name: openwebui-db-capacity
    type: vlogs
    interval: 5m
    rules:
      # 500MB → hint sớm, dev nên chạy VACUUM. Chưa tác động user.
      - alert: OpenWebUIDbSizeHint
        expr: 'service:openwebui-db-monitor _msg:webui_db_size | stats by (host) max(size_bytes) as value | filter value:>524288000 AND value:<2147483648'
        for: 15m
        labels:
          severity: info
          category: capacity
          component: openwebui-db
        annotations:
          summary: "OpenWebUI webui.db > 500MB trên {{ $labels.host }}"
          description: "webui.db = {{ $value }} bytes. Lên lịch VACUUM + PRAGMA optimize trong backup script."

      # 2GB = ngưỡng bắt đầu ảnh hưởng query chat list (>1s p95 quan sát).
      # Action: prune chat > 6 tháng hoặc migrate Postgres.
      - alert: OpenWebUIDbSizeWarning
        expr: 'service:openwebui-db-monitor _msg:webui_db_size | stats by (host) max(size_bytes) as value | filter value:>2147483648 AND value:<5368709120'
        for: 15m
        labels:
          severity: warning
          category: capacity
          component: openwebui-db
        annotations:
          summary: "OpenWebUI webui.db > 2GB trên {{ $labels.host }} — query bắt đầu chậm"
          description: "webui.db = {{ $value }} bytes. SQLite 1 writer, > 2GB chat list p95 > 1s. Prune chat > 6 tháng hoặc chuẩn bị migrate Postgres (xem plan 260701-1544 phase-05)."

      # 5GB = phải migrate. Concurrent write lock rõ, backup tarball > 1GB.
      - alert: OpenWebUIDbSizeCritical
        expr: 'service:openwebui-db-monitor _msg:webui_db_size | stats by (host) max(size_bytes) as value | filter value:>5368709120'
        for: 15m
        labels:
          severity: critical
          category: capacity
          component: openwebui-db
        annotations:
          summary: "OpenWebUI webui.db > 5GB trên {{ $labels.host }} — MIGRATE POSTGRES NGAY"
          description: "webui.db = {{ $value }} bytes. Lock contention chắc chắn xuất hiện. Chạy migrate SQLite → Postgres theo docs/deployment-llm-abstraction.md."

      # Probe stale = vector exec source không chạy hoặc mount ro bị hỏng.
      # Nếu 15m không có event nào từ openwebui-db-monitor = báo động silent-fail.
      - alert: OpenWebUIDbProbeStale
        expr: 'service:openwebui-db-monitor _msg:webui_db_size | stats count() as value | filter value:<1'
        for: 15m
        labels:
          severity: warning
          category: monitoring
          component: openwebui-db
        annotations:
          summary: "OpenWebUI DB size probe im lặng ≥15m"
          description: "Không có event webui_db_size trong 15m — check vector container + mount /monitor/openwebui:ro."

  # ─────────────────────────────────────────────────────────────────────────
  # LLM COST — cost tracking + balance monitoring. Source: provider_cost stream
  # (DeepSeek/OpenAI/Anthropic polling) + litellm_cost stream (LiteLLM proxy).
  # interval=60s: cost data updates every 60s from probe scripts.
  # Thresholds: hardcoded MVP values. Tune via .env after 1 week ops baseline.
  # NOTE: `_time:` filters removed — vmalert injects window via `interval`.
  # ─────────────────────────────────────────────────────────────────────────
  - name: llm_cost
    type: vlogs
    interval: 5m
    rules:
      # Threshold $5: minimum comfortable buffer for overnight batch jobs.
      # Below $5 means ~1-2 days runway at typical usage — top up urgently.
      - alert: DeepSeekBalanceLow
        expr: |
          service:provider_cost provider:deepseek _time:15m
            | stats avg(balance_usd) as b
            | filter b:>0 AND b:<5
        for: 0m
        labels:
          severity: warning
          team: llm-cost
        annotations:
          summary: "DeepSeek balance còn {{ $value }} USD"
          description: "Balance < $5. Top up trước khi hết — liên hệ platform.deepseek.com"

      # Threshold $3/day: OpenAI daily budget cap. Daily spend > $3 suggests
      # runaway usage or a rogue user — investigate before monthly cap hit.
      - alert: OpenAIDailyCostHigh
        expr: |
          service:provider_cost provider:openai _time:15m
            | stats avg(cost_usd_day) as c
            | filter c:>3
        for: 0m
        labels:
          severity: warning
          team: llm-cost
        annotations:
          summary: "OpenAI hôm nay đã tiêu {{ $value }} USD (cap $3)"
          description: "OpenAI daily cost vượt $3. Check litellm spend logs / per-user breakdown."

      # Threshold $14/month ≈ 70% of $20 soft cap. Fire early to allow 30%
      # buffer before hard billing cap. for=15m avoids transient sum spikes.
      - alert: AnthropicMonthlyNearCap
        expr: |
          service:provider_cost provider:anthropic _time:30d
            | stats sum(cost_usd_day) as m
            | filter m:>14
        for: 15m
        labels:
          severity: warning
          team: llm-cost
        annotations:
          summary: "Anthropic tháng {{ $value }} USD > 70% cap $20"
          description: "Anthropic monthly cost > $14. Review usage hoặc raise billing cap nếu cần."

      # Threshold >20 fallback events/24h: indicates persistent provider issues.
      # Occasional fallbacks are normal; sustained >20 = systemic problem.
      # for=5m: avoid alerting on brief spikes during deployment windows.
      - alert: FallbackRateHigh
        expr: |
          service:litellm_cost fallback:true _time:24h
            | stats count() as n
            | filter n:>20
        for: 5m
        labels:
          severity: warning
          team: llm-cost
        annotations:
          summary: "Fallback events 24h = {{ $value }} (> 20). Provider unstable."
          description: "Cao bất thường — check primary provider health + LiteLLM fallback logs. Runbook: docs/deployment-llm-abstraction.md"

      # Threshold $2/user/day: per-user daily budget guard.
      # user_api_key_alias:* excludes empty/anonymous keys intentionally.
      # for=5m: prevents alert on short usage bursts within normal session.
      - alert: UserDailyBudgetExceeded
        expr: |
          service:litellm_cost user_api_key_alias:* _time:24h
            | stats by (user_api_key_alias) sum(response_cost) as spent
            | filter spent:>2
        for: 5m
        labels:
          severity: info
          team: llm-cost
        annotations:
          summary: "User {{ $labels.user_api_key_alias }} spent {{ $value }} USD hôm nay"
          description: "Daily budget $2 vượt. Check nếu automation script chạy không kiểm soát."

      # DISABLED — `math` pipe operator support in VictoriaLogs LogsQL is
      # unconfirmed for current pinned image. Enabling this rule when the pipe
      # is unsupported would parse-error and break the whole `llm_cost` group.
      #
      # Re-enable path when verified (or use recording rule pair):
      #   1. Test in vmui: `service:litellm_cost model:claude* | stats sum(cache_read_input_tokens) as cr, sum(prompt_tokens) as pt | math (cr / pt) * 100 as pct`
      #   2. If parse OK → uncomment block below.
      #   3. If parse fail → convert to recording-rule pair (emit cr/pt as
      #      metrics, alert on ratio in PromQL-compatible expr).
      #
      # Threshold rationale: Anthropic prompt caching yields >60% hit rate
      # with stable system prompts. Below 40% ⇒ cache_control header missing
      # or system prompt churn too high. for=30m avoids cold-start noise.
      #
      # - alert: AnthropicCacheHitLow
      #   expr: |
      #     service:litellm_cost model:claude*
      #       | stats sum(cache_read_input_tokens) as cr, sum(prompt_tokens) as pt
      #       | math (cr / pt) * 100 as pct
      #       | filter pct:>0 AND pct:<40
      #   for: 30m
      #   labels:
      #     severity: info
      #     team: llm-cost
      #   annotations:
      #     summary: "Anthropic cache hit {{ $value }}% < 40% — kiểm tra prompt caching header"
      #     description: "Cache hit thấp = token wasted. Verify cache_control header trong LiteLLM system prompt config."


  # ─────────────────────────────────────────────────────────────────────────
  # DISK CAPACITY — 5 rules: warning@75 + critical@88 cho / và /opt/ragstack/data,
  # cộng DiskProbeStale detect probe silent.
  #
  # LogsQL notes (khớp precedent llm_cost + openwebui-db):
  #   - Explicit `_time:15m` filter (vmalert vlogs không inject window — commit d55a6d6).
  #   - `max(used_pct)` aggregate (precedent openwebui-db-capacity dùng max()).
  #   - `filter value:>N` word syntax (khớp llm_cost group).
  #   - `source_stream:` filter chống log injection từ container khác.
  # ─────────────────────────────────────────────────────────────────────────
  - name: disk-alerts
    type: vlogs
    interval: 5m
    rules:
      # Data disk /opt/ragstack/data — warning 75%, notify sớm cho ops proactive.
      - alert: DiskDataHighWarn
        expr: |
          service:logserver-disk-monitor source_stream:vector-exec-probe _time:15m
            | stats by (mount) max(used_pct) as value
            | filter value:>75
        for: 15m
        labels:
          severity: warning
          category: capacity
          component: data-disk
        annotations:
          summary: "Data disk {{ $labels.mount }} > 75% used"
          description: "/opt/ragstack/data đang {{ $value }}% used. Kiểm tra VL retention hoặc backup archive size. Trigger tune VL_RETENTION nếu > 80%."

      # Data disk critical 88% — page immediately, không đợi for:
      - alert: DiskDataHighCrit
        expr: |
          service:logserver-disk-monitor source_stream:vector-exec-probe _time:15m
            | stats by (mount) max(used_pct) as value
            | filter value:>88
        for: 0s
        labels:
          severity: critical
          category: capacity
          component: data-disk
        annotations:
          summary: "Data disk {{ $labels.mount }} > 88% CRITICAL"
          description: "/opt/ragstack/data đang {{ $value }}% — sắp vỡ. Giảm VL_RETENTION, xóa backup cũ, hoặc thêm ổ ngay."

      # Root partition / — warning 75%. Fed bởi host cron probe-host-disk-root.sh.
      - alert: DiskRootHighWarn
        expr: |
          service:host-disk-monitor source_stream:host-cron-probe _time:15m
            | stats by (mount) max(used_pct) as value
            | filter value:>75
        for: 15m
        labels:
          severity: warning
          category: capacity
          component: root-partition
        annotations:
          summary: "Root partition {{ $labels.mount }} > 75% used"
          description: "/ (98GB OS) đang {{ $value }}% used. Nguyên nhân thường: docker container log unbounded, apt cache, /tmp. Chạy `du -sh /var/lib/docker/containers/*/ | sort -h | tail`."

      # Root critical 88% — immediate page. Docker daemon socket có thể fail nếu / đầy.
      - alert: DiskRootHighCrit
        expr: |
          service:host-disk-monitor source_stream:host-cron-probe _time:15m
            | stats by (mount) max(used_pct) as value
            | filter value:>88
        for: 0s
        labels:
          severity: critical
          category: capacity
          component: root-partition
        annotations:
          summary: "Root partition {{ $labels.mount }} > 88% CRITICAL"
          description: "/ đang {{ $value }}% — sắp vỡ. Docker socket có thể fail. Xóa apt cache, docker log, /tmp ngay."

      # Probe silent > 20m = Vector container down hoặc host cron chết → mất visibility.
      # Mirror pattern OpenWebUIDbProbeStale.
      # `for: 5m` chống warmup transient: mỗi probe tick 5m nên baseline count
      # cần 15-25m post-boot để đạt threshold 3. Real failure vẫn detect < 25m.
      - alert: DiskProbeStale
        expr: |
          (service:logserver-disk-monitor OR service:host-disk-monitor) _time:20m
            | stats by (service) count() as value
            | filter value:<3
        for: 5m
        labels:
          severity: warning
          category: monitoring
          component: disk-probe
        annotations:
          summary: "Disk probe {{ $labels.service }} stale (< 3 events / 20m)"
          description: "Probe {{ $labels.service }} không emit đủ. Vector container down (data probe) hoặc host cron chết (root probe). Restart hoặc verify crontab."

  # ─────────────────────────────────────────────────────────────────────────
  # LOG PIPELINE SELFCHECK — detect silent failures của chính pipeline.
  # Plan 260713-1520 Phase 1a. HostLogSilent + DockerRestartLoop defer P2
  # (cần extend Vector: Prometheus metrics + docker daemon scrape).
  # Chicken-egg caveat: nếu VL sập hoàn toàn thì rule không eval được.
  # ─────────────────────────────────────────────────────────────────────────
  - name: log-pipeline-selfcheck
    type: vlogs
    interval: 5m
    rules:
      # VictoriaLogs self-error burst. Threshold >10/2m conservative — hạ 5 sau
      # baseline (Phase 05 tune). Explicit _time:5m per convention.
      - alert: VictoriaLogsSelfError
        expr: |
          service:victorialogs severity:(err OR error OR fatal) _time:5m
            | stats by (host) count() as value, row_any(_msg) as sample_msg
            | filter value:>10
        for: 2m
        labels:
          severity: critical
          category: monitoring
          component: victorialogs
        annotations:
          summary: "VictoriaLogs err burst trên {{ $labels.host }} ({{ $value }}/2m)"
          description: "VL container báo err. Check disk / ingest lag: docker logs ragstack-victorialogs | tail -100"

  # ─────────────────────────────────────────────────────────────────────────
  # SEMANTIC PIPELINE INPUT — mock-logs.service trên srv-01/srv-02 phải bơm
  # WARN+ liên tục để (a) sanity-test Vector→NATS→indexer→Qdrant chain,
  # (b) validate vmalert rule (SSH brute, mysql err, audit fail) còn hoạt động.
  #
  # Lịch sử 2026-07-10 → 2026-07-13: mock-logs stopped trên clients → 0 WARN+
  # trong VL 3 ngày → Vector NATS sink idle → Qdrant không index template mới
  # → mcp-semantic trả kết quả cũ. Silent regression (không rule nào bắn).
  #
  # Rule: 0 WARN+ trong 30m → alert. Nếu prod system thật sự healthy zero,
  # đổi threshold hoặc dùng canary explicit (topic riêng).
  # ─────────────────────────────────────────────────────────────────────────
  - name: semantic-pipeline
    type: vlogs
    interval: 5m
    rules:
      - alert: WarnEventsStale
        expr: |
          severity:(warning OR warn OR err OR error OR crit OR alert OR emerg) _time:30m
            | stats count() as value
            | filter value:<1
        for: 5m
        labels:
          severity: warning
          category: monitoring
          component: semantic-pipeline
        annotations:
          summary: "0 WARN+ events / 30m — semantic RAG pipeline có thể stale"
          description: "Không có event severity WARN+ nào trong 30m. Nguyên nhân thường: mock-logs.service trên srv-01/srv-02 stopped, hoặc severity parsing broken ở Vector VRL. Verify: `ssh srv-01 systemctl status mock-logs`. Impact: Qdrant không index template mới → mcp-semantic serve kết quả cũ."
