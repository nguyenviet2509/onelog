# rsyslog main config for E2E test client container.
# Reads from local /dev/log (imuxsock), forwards JSON via omfwd to OneLog Vector.
# ONELOG_HOST is resolved at run time via env var (rsyslog $-expr).

global(workDirectory="/var/spool/rsyslog")

module(load="imuxsock"
       SysSock.Use="on"
       SysSock.Name="/dev/log")

# Optional: also accept TCP from outside (for direct logger -n)
module(load="imtcp")
input(type="imtcp" port="5514")

# ECS-lite JSON template — same shape as infra/clients/rsyslog-forward-json.conf
template(name="OneLogJSON" type="list") {
  constant(value="{")
  constant(value="\"@timestamp\":\"")
  property(name="timereported" dateFormat="rfc3339")
  constant(value="\",\"host\":{\"name\":\"")
  property(name="hostname" format="json")
  constant(value="\"},\"log\":{\"level\":\"")
  property(name="syslogseverity-text" format="json")
  constant(value="\"},\"service\":{\"name\":\"")
  property(name="programname" format="json")
  constant(value="\"},\"message\":\"")
  property(name="msg" format="json")
  constant(value="\"}\n")
}

*.* action(type="omfwd"
  target="127.0.0.1"
  port="6515"
  protocol="tcp"
  template="OneLogJSON"
  action.resumeRetryCount="-1"
  queue.type="LinkedList"
  queue.size="10000"
  queue.filename="onelog_json_test"
  queue.saveOnShutdown="on"
  queue.maxDiskSpace="100m"
)
